apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: mongodb-network-latency-chaos
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus
  appinfo:
    appns: idurar
    applabel: app=mongodb
    appkind: statefulset

  experiments:
    - name: pod-network-latency
      spec:
        components:
          env:
            - name: NETWORK_LATENCY
              value: "2000"   # ms

            - name: TOTAL_CHAOS_DURATION
              value: "120"

            - name: CHAOS_INTERVAL
              value: "10"

            - name: PODS_AFFECTED_PERC
              value: "100"

            - name: TARGET_CONTAINER
              value: "mongodb"

            - name: NETWORK_INTERFACE
              value: "eth0"

            - name: CONTAINER_RUNTIME
              value: "containerd"

            - name: SOCKET_PATH
              value: "/run/containerd/containerd.sock"

            - name: RAMP_TIME
              value: "30"
