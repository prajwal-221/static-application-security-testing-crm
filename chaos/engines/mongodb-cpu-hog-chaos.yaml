apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: mongodb-cpu-hog-chaos
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus
  appinfo:
    appns: idurar
    applabel: app=mongodb
    appkind: statefulset

  experiments:
    - name: pod-cpu-hog
      spec:
        components:
          env:
            - name: CPU_CORES
              value: "1"

            - name: TOTAL_CHAOS_DURATION
              value: "120"

            - name: CHAOS_INTERVAL
              value: "10"

            - name: PODS_AFFECTED_PERC
              value: "100"

            - name: TARGET_CONTAINER
              value: "mongodb"

            - name: CONTAINER_RUNTIME
              value: "containerd"

            - name: SOCKET_PATH
              value: "/run/containerd/containerd.sock"

            - name: RAMP_TIME
              value: "30"
