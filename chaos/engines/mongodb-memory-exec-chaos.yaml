apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: mongodb-memory-exec-chaos
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus

  appinfo:
    appns: idurar
    applabel: "app=mongodb"
    appkind: statefulset

  experiments:
    - name: container-exec
      spec:
        components:
          env:
            - name: TARGET_CONTAINER
              value: mongodb

            - name: COMMAND
              value: |
                echo "Starting memory stress"
                python3 - <<EOF
                import time
                data = []
                for _ in range(256):
                    data.append(bytearray(1024*1024))
                time.sleep(120)
                EOF
                echo "Memory stress completed"

            - name: TOTAL_CHAOS_DURATION
              value: "120"
