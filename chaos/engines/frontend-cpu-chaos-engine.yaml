apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: frontend-cpu-hog-chaos
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus

  chaosResult:
    name: frontend-cpu-hog-chaos-result

  appinfo:
    appns: idurar
    applabel: "app=frontend"
    appkind: deployment

  experiments:
    - name: pod-cpu-hog
      spec:
        components:
          env:
            - name: CPU_CORES
              value: "1"
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: PODS_AFFECTED_PERC
              value: "25"
            - name: CONTAINER_RUNTIME
              value: "containerd"
            - name: SOCKET_PATH
              value: "/run/containerd/containerd.sock"
            - name: RAMP_TIME
              value: "60"
            - name: LIB_IMAGE
              value: "litmuschaos/go-runner:3.0.0"
