apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: mongodb-network-exec-chaos
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus

  appinfo:
    appns: idurar
    applabel: "app=mongodb"
    appkind: statefulset

  experiments:
    - name: container-exec
      spec:
        components:
          env:
            - name: TARGET_CONTAINER
              value: mongodb

            - name: COMMAND
              value: |
                echo "Simulating network latency via socket sleep"
                sleep 120
                echo "Network latency simulation completed"

            - name: TOTAL_CHAOS_DURATION
              value: "120"
