apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litmus-cluster-role
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - configmaps
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Apps
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch", "patch", "update"]

  # Batch (THIS IS THE FIX)
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Litmus CRDs
  - apiGroups: ["litmuschaos.io"]
    resources:
      - chaosengines
      - chaosexperiments
      - chaosresults
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
