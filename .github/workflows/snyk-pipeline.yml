name: Snyk Secrets Scan

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:
  snyk-secrets:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master
        with:
          snyk-version: latest
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Secrets Scan
        run: snyk secrets scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Secrets Scan (JSON)
        run: snyk secrets scan --json > snyk-secrets.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk Secrets Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-secrets-report
          path: snyk-secrets.json
          retention-days: 30
