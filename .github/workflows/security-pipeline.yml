name: Security Pipeline (Staging)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  DOCKER_BUILDKIT: 1

jobs:

  ########################################################
  # Task 5 & 6 — Secret Scan (Gitleaks)
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create Report Directory
        run: mkdir -p $SEC_REPORTS_DIR

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  ########################################################
  # Task 7 & 8 — SCA Filesystem Scan (Trivy)
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Run Trivy FS Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output $SEC_REPORTS_DIR/trivy-fs.json .

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  ########################################################
  # Task 9 & 10 — SAST (Semgrep)
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


  ########################################################
  # Docker Security Pipeline (Build → Scan → DAST)
  ########################################################
  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Export Secrets
      ########################################################
      - name: Export Secrets
        run: |
          echo "DATABASE=${{ secrets.DATABASE }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> $GITHUB_ENV
          echo "OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}" >> $GITHUB_ENV
          echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}" >> $GITHUB_ENV
          echo "PORT=${{ secrets.PORT }}" >> $GITHUB_ENV
          echo "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}" >> $GITHUB_ENV
          echo "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}" >> $GITHUB_ENV

      ########################################################
      # Setup Trivy
      ########################################################
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      ########################################################
      # Build Docker Images
      ########################################################
      - name: Build Docker Images
        run: docker compose build

      ########################################################
      # Image Scan
      ########################################################
      - name: Scan Docker Images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | while read image; do
            trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json" \
              "$image"
          done || true

      ########################################################
      # Deploy for DAST
      ########################################################
      - name: Deploy Stack
        run: docker compose up -d

      - name: Wait for Startup
        run: sleep 40

      ########################################################
      # Runtime Scan
      ########################################################
      - name: Runtime Scan
        run: |
          docker ps --format "{{.ID}}" | while read cid; do
            trivy container \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json" \
              "$cid"
          done || true

      ########################################################
      # DAST — OWASP ZAP Baseline
      ########################################################
      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --network host \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      ########################################################
      # Upload Docker Security Reports
      ########################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            zap-baseline.html
            zap-baseline.json


  ########################################################
  # Final Consolidated Security Deliverable
  ########################################################
  final_security_report:
    name: Centralized Security Deliverables
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports

      - name: Generate Report Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          echo "" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt

      - name: Upload Final Security Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
