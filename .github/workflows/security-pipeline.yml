name: Security Pipeline (Staging)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  TRIVY_CACHE_DIR: .trivycache
  DOCKER_BUILDKIT: 1

jobs:

  ########################################################
  # Task 5 & 6 — Secret Scan (Gitleaks)
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true   # Discovery mode
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path security-reports/gitleaks-report.json

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  ########################################################
  # Task 7 & 8 — SCA FS Scan (Trivy)
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true   # Discovery mode
    steps:
      - uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Run Trivy FS Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output $SEC_REPORTS_DIR/trivy-fs.json

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  ########################################################
  # Task 9 & 10 — SAST (Semgrep)
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true   # Discovery mode
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


  ########################################################
  # Tasks 11 → 16 — Docker Build + Image Scan + Runtime + DAST
  ########################################################
  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true   # Discovery mode

    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Setup Environment Variables (from GitHub Secrets)
      ########################################################
      - name: Export Runtime Secrets
        run: |
          echo "DATABASE=${{ secrets.DATABASE }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> $GITHUB_ENV
          echo "OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}" >> $GITHUB_ENV
          echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}" >> $GITHUB_ENV
          echo "PORT=${{ secrets.PORT }}" >> $GITHUB_ENV

      ########################################################
      # Install Trivy CLI
      ########################################################
      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.3_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.3_Linux-64bit.deb

      ########################################################
      # Task 11 — Build Docker Images
      ########################################################
      - name: Build Docker Images
        run: docker compose build

      ########################################################
      # Task 12 & 13 — Image Vulnerability Scan
      ########################################################
      - name: Scan Built Images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | while read image; do
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json"
          done || true

      ########################################################
      # Task 14 — Deploy for DAST
      ########################################################
      - name: Deploy Application Stack
        run: docker compose up -d

      - name: Wait for Application Startup
        run: sleep 40

      ########################################################
      # Task 15 — Runtime Vulnerability Scan (Trivy)
      ########################################################
      - name: Runtime Container Scan
        run: |
          docker ps --format "{{.ID}}" | while read cid; do
            trivy container "$cid" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json"
          done || true

      ########################################################
      # Task 16 — DAST (OWASP ZAP Baseline)
      ########################################################
      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run \
            -v $(pwd):/zap/wrk \
            owasp/zap2docker-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      ########################################################
      # Upload Docker Security Reports
      ########################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            zap-baseline.html
            zap-baseline.json


  ########################################################
  # Final Stage — Centralized Security Deliverables
  ########################################################
  final_security_report:
    name: Centralized Security Deliverables
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline
    steps:
      - name: Download All Security Reports
        uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports

      - name: Generate Security Report Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          echo "" >> consolidated-security-reports/README.txt
          echo "Included Reports:" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt

      - name: Upload Final Security Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
