name: Security Pipeline (Staging)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  TRIVY_CACHE_DIR: .trivycache
  DOCKER_BUILDKIT: 1

jobs:

  ########################################################
  # Secret Scan — Gitleaks
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path security-reports/gitleaks-report.json

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  ########################################################
  # SCA FS Scan — Trivy
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Run Trivy Filesystem Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          trivy filesystem . \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output $SEC_REPORTS_DIR/trivy-fs.json || true

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  ########################################################
  # SAST — Semgrep
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


  ########################################################
  # Docker Build + Image + Runtime + DAST
  ########################################################
  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Export Secrets into Runtime
      ########################################################
      - name: Export Runtime Secrets
        run: |
          echo "DATABASE=${{ secrets.DATABASE }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> $GITHUB_ENV
          echo "OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}" >> $GITHUB_ENV
          echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}" >> $GITHUB_ENV
          echo "PORT=${{ secrets.PORT }}" >> $GITHUB_ENV

      ########################################################
      # Setup Trivy CLI
      ########################################################
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      ########################################################
      # Build Docker Images
      ########################################################
      - name: Build Docker Images
        run: docker compose build

      ########################################################
      # Image Vulnerability Scan
      ########################################################
      - name: Scan Built Images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" | while read image; do
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --scanners vuln \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json" || true
          done

      ########################################################
      # Deploy Stack for Runtime + DAST
      ########################################################
      - name: Deploy Application Stack
        run: docker compose up -d

      - name: Wait for App Startup
        run: sleep 40

      ########################################################
      # Runtime Container Scan
      ########################################################
      - name: Runtime Container Scan
        run: |
          docker ps --format "{{.ID}}" | while read cid; do
            trivy rootfs "/proc/$cid/root" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --scanners vuln \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json" || true
          done

      ########################################################
      # DAST — OWASP ZAP (FIXED IMAGE + TAG)
      ########################################################
      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker pull owasp/zap2docker-stable:2.14.0

          docker run --rm \
            -v $(pwd):/zap/wrk \
            --network host \
            owasp/zap2docker-stable:2.14.0 \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      ########################################################
      # Upload Docker Security Reports
      ########################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            zap-baseline.html
            zap-baseline.json


  ########################################################
  # Final Aggregated Security Reports
  ########################################################
  final_security_report:
    name: Centralized Security Deliverables
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline

    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports

      - name: Generate Security Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          echo "" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt

      - name: Upload Final Security Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
