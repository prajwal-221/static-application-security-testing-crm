  defectdojo:
    name: DefectDojo Report Upload
    runs-on: ubuntu-latest
    needs: final_security_report
    continue-on-error: true

    steps:
      ############################################################
      # Download Final Security Report
      ############################################################
      - name: Download Final Security Report
        uses: actions/download-artifact@v4
        with:
          name: FINAL-SECURITY-REPORT
          path: final-report

      ############################################################
      # Upload Full Final Report (Attachment)
      ############################################################
      - name: Upload Full Final Report to DefectDojo
        shell: bash
        run: |
          set -e

          echo "Uploading report to DefectDojo..."

          curl -s -X POST "https://demo.defectdojo.org/api/v2/files/" \
            -H "Authorization: Token ${{ secrets.DOJO_API_KEY }}" \
            -F "file=@final-report/final-security-report.md" \
            -F "engagement=${{ secrets.DOJO_ENGAGEMENT_ID }}" \
            -F "title=Final Security Assessment" \
            -F "description=Automated CI/CD generated security assessment"
