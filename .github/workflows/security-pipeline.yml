name: Enterprise DevSecOps Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: idurar-ci
  DOCKER_BUILDKIT: 1

############################################################
# STAGE 1 — Secrets + Dependency Scanning (SCA)
############################################################
jobs:
  secrets_and_sca:
    name: Secrets + SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Reports Directory
        run: mkdir -p $SEC_REPORTS_DIR

      - name: Secret Scan — Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      - name: Dependency Scan — Trivy FS
        run: |
          docker run --rm -v "$PWD:/scan" aquasec/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: secrets-and-sca-reports
          path: ${{ env.SEC_REPORTS_DIR }}/


############################################################
# STAGE 2 — Static Application Security Testing (SAST)
############################################################
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


############################################################
# STAGE 3 — Docker Build + Image + Runtime + DAST
############################################################
  docker_security:
    name: Docker Build + Image + Runtime + DAST
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Docker Login
      ############################################################
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ############################################################
      # Secure .env Generation
      ############################################################
      - name: Generate Secure .env
        run: |
          umask 077
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=${{ vars.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          DATABASE=${{ secrets.DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=${{ vars.NODE_ENV }}
          PORT=${{ vars.PORT }}
          PUBLIC_SERVER_FILE=${{ vars.PUBLIC_SERVER_FILE }}
          OPENSSL_CONF=/dev/null
          EOF
          chmod 600 .env

      ############################################################
      # Docker Build
      ############################################################
      - name: Build Docker Images
        run: docker compose build

      ############################################################
      # Docker Image Scan — Trivy
      ############################################################
      - name: Trivy Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR

          for IMAGE in idurar-backend:latest idurar-frontend:latest; do
            SAFE=$(echo "$IMAGE" | tr '/:' '_')
            echo "Scanning image: $IMAGE"

            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasec/trivy:latest \
              image "$IMAGE" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              -o /out/$SEC_REPORTS_DIR/trivy-image-$SAFE.json || true
          done

      ############################################################
      # Deploy Stack
      ############################################################
      - name: Deploy Stack
        run: docker compose up -d

      ############################################################
      # Docker Status Snapshot
      ############################################################
      - name: Docker Status Snapshot
        run: |
          echo "===== Docker Containers ====="
          docker ps -a
          echo ""
          echo "===== Docker Compose Services ====="
          docker compose ps

      ############################################################
      # MongoDB Logs + Health
      ############################################################
      - name: MongoDB Logs & Health
        run: |
          echo "===== MongoDB Logs ====="
          docker logs idurar-mongodb --tail=100 || true
          echo ""
          echo "===== MongoDB Health ====="
          docker inspect --format='{{.State.Health.Status}}' idurar-mongodb || true

      ############################################################
      # Backend Logs
      ############################################################
      - name: Backend Startup Logs
        run: |
          echo "===== Backend Logs ====="
          docker logs idurar-backend --tail=200 || true

      ############################################################
      # Frontend Logs
      ############################################################
      - name: Frontend Startup Logs
        run: |
          echo "===== Frontend Logs ====="
          docker logs idurar-frontend --tail=200 || true

      ############################################################
      # Backend Health Check (ROBUST)
      ############################################################
      - name: Backend Health Check
        run: |
          echo "Waiting for backend to become healthy..."

          for i in {1..60}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "Backend is healthy"
              exit 0
            fi

            echo "Retry $i/60 — backend not ready yet"
            docker ps -a | grep idurar || true
            sleep 5
          done

          echo "Backend failed to start within timeout"

          echo "===== Backend Logs ====="
          docker logs idurar-backend --tail=200 || true

          echo "===== MongoDB Logs ====="
          docker logs idurar-mongodb --tail=200 || true

          echo "===== Docker Compose Status ====="
          docker compose ps

          exit 1

      ############################################################
      # Runtime Scan — Trivy (IMAGE MODE)
      ############################################################
      - name: Runtime Scan — Trivy
        run: |
          for IMAGE in idurar-backend:latest idurar-frontend:latest; do
            SAFE=$(echo "$IMAGE" | tr '/:' '_')

            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasec/trivy:latest \
              image "$IMAGE" \
              --format json \
              -o /out/$SEC_REPORTS_DIR/trivy-runtime-$SAFE.json || true
          done

      ############################################################
      # DAST — OWASP ZAP
      ############################################################
      - name: OWASP ZAP Baseline
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm --network host \
            -v "$PWD/$SEC_REPORTS_DIR:/zap/wrk" zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap.html \
            -J zap.json || true

      ############################################################
      # Upload Docker Security Reports
      ############################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            security-reports/zap.html
            security-reports/zap.json

      ############################################################
      # Cleanup Docker Environment
      ############################################################
      - name: Cleanup Docker
        if: always()
        run: docker compose down -v --remove-orphans


############################################################
# STAGE 4 — Final Aggregated Report
############################################################
  final_report:
    name: Final Security Report Bundle
    runs-on: ubuntu-latest
    needs:
      - secrets_and_sca
      - sast
      - docker_security

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Create Report Index
        run: |
          echo "Enterprise DevSecOps Security Reports" > reports/README.txt
          echo "====================================" >> reports/README.txt
          find reports -type f >> reports/README.txt

      - name: Upload Final Report Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-REPORTS
          path: reports
