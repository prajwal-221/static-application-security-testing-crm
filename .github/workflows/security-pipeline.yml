name: Enterprise DevSecOps Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: idurar-ci
  DOCKER_BUILDKIT: 1

jobs:

  ############################################################
  # SINGLE PIPELINE STAGE — ALL 16 TASKS
  ############################################################
  devsecops:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      ############################################################
      # Checkout Code
      ############################################################
      - name: Checkout Source
        uses: actions/checkout@v4

      ############################################################
      # Setup Secure Environment Variables
      ############################################################
      - name: Generate Secure .env
        run: |
          umask 077
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=rootpassword
          DATABASE=mongodb://root:rootpassword@mongodb:27017/idurar?authSource=admin
          JWT_SECRET=${{ secrets.JWT_SECRET || 'ci_secret' }}
          NODE_ENV=staging
          OPENSSL_CONF=/dev/null
          PUBLIC_SERVER_FILE=http://backend:4000/
          PORT=4000
          EOF
          chmod 600 .env

      ############################################################
      # (5) Secret Scan — Gitleaks
      ############################################################
      - name: Secret Scan — Gitleaks
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      ############################################################
      # (6) Secret Gate — Enforced
      ############################################################
      - name: Enforce Secret Gate
        run: |
          if jq -e '.[]' $SEC_REPORTS_DIR/gitleaks.json > /dev/null; then
            echo "❌ Secrets detected — blocking pipeline"
            exit 1
          fi
          echo "✅ No secrets found"

      ############################################################
      # (7) SCA Filesystem Scan — Trivy
      ############################################################
      - name: Dependency Scan — Trivy FS
        run: |
          docker run --rm -v "$PWD:/scan" aquasecurity/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      ############################################################
      # (8) SCA Gate — Enforced
      ############################################################
      - name: Enforce SCA Gate
        run: |
          if jq '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL")' \
            $SEC_REPORTS_DIR/trivy-fs.json | grep -q .; then
            echo "❌ High/Critical dependency vulnerabilities detected"
            exit 1
          fi
          echo "✅ Dependency security passed"

      ############################################################
      # (9) SAST — Semgrep
      ############################################################
      - name: SAST — Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      ############################################################
      # (10) SAST Gate — Enforced
      ############################################################
      - name: Enforce SAST Gate
        run: |
          if [ -d ".semgrep_logs" ] && grep -q '"severity":"ERROR"' .semgrep_logs/*; then
            echo "❌ Critical SAST vulnerabilities detected"
            exit 1
          fi
          echo "✅ SAST passed"

      ############################################################
      # (11) Build Application Images — SINGLE STAGE COMPOSE
      ############################################################
      - name: Build Docker Images
        run: docker compose build

      ############################################################
      # (12) Image Scan — Trivy
      ############################################################
      - name: Docker Image Scan
        run: |
          docker compose images -q | sort -u | while read img; do
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasecurity/trivy:latest \
              image "$img" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output /out/$SEC_REPORTS_DIR/trivy-image.json || true
          done

      ############################################################
      # (13) Image Gate — Enforced
      ############################################################
      - name: Enforce Image Gate
        run: |
          if jq '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL")' \
            $SEC_REPORTS_DIR/trivy-image.json | grep -q .; then
            echo "❌ Image vulnerabilities detected"
            exit 1
          fi
          echo "✅ Docker images secure"

      ############################################################
      # (14) Deploy Stack For Testing
      ############################################################
      - name: Deploy Application Stack
        run: docker compose up -d

      ############################################################
      # Backend Health Check (UPDATED ENDPOINT)
      ############################################################
      - name: Wait for Backend Health
        run: |
          echo "Waiting for backend health endpoint..."
          for i in {1..30}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Backend failed to become healthy"
          docker compose logs
          exit 1

      ############################################################
      # (15) Runtime Scan — Trivy
      ############################################################
      - name: Runtime Container Scan
        run: |
          docker ps -q | while read cid; do
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasecurity/trivy:latest \
              container "$cid" \
              --format json \
              --output /out/$SEC_REPORTS_DIR/trivy-runtime.json || true
          done

      ############################################################
      # (16) DAST — OWASP ZAP
      ############################################################
      - name: OWASP ZAP Baseline Scan
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm --network host -u root \
            -v "$PWD:/zap/wrk" zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap.html \
            -J zap.json || true

      ############################################################
      # Upload Reports
      ############################################################
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-REPORTS
          path: |
            security-reports/
            zap.html
            zap.json

      ############################################################
      # Cleanup Docker Resources
      ############################################################
      - name: Cleanup Docker Environment
        if: always()
        run: docker compose down -v --remove-orphans
