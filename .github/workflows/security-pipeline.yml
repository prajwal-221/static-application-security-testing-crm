name: Security Pipeline (Staging)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  DOCKER_BUILDKIT: 1

jobs:

  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json
      - uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json

  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0
      - name: Run Trivy FS Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > $SEC_REPORTS_DIR/trivy-fs.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: ${{ env.SEC_REPORTS_DIR }}/trivy-fs.json

  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/

  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Build Docker Images
        run: docker compose build

      - name: Scan Docker Images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" | while read image; do
            echo "Scanning image: $image"
            # use redirection to avoid `--output` incompatibilities
            trivy image --severity HIGH,CRITICAL --ignore-unfixed --format json "$image" \
              > "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json" || true
          done

      - name: Deploy Application
        run: docker compose up -d

      - name: Wait for Services (health check)
        run: |
          # Wait up to 60s for the backend to respond on port 4000
          retries=12
          wait_seconds=5
          attempt=0
          until curl -sSf http://localhost:4000/ || [ $attempt -eq $retries ]; do
            echo "Waiting for http://localhost:4000 (attempt: $attempt)"
            attempt=$((attempt+1))
            sleep $wait_seconds
          done
          if [ $attempt -eq $retries ]; then
            echo "Service did not become ready within $((retries*wait_seconds))s"
          else
            echo "Service is reachable"
          fi

      - name: Runtime Container Scan (scan image of each running container)
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker ps --format "{{.ID}}" | while read cid; do
            # get the image ID or name used by the running container
            image_ref=$(docker inspect --format='{{.Image}}' "$cid" 2>/dev/null || true)
            if [ -z "$image_ref" ]; then
              echo "Could not resolve image for container $cid, skipping"
              continue
            fi
            # trivy image supports severity and format reliably — redirect output to file
            echo "Runtime scanning image: $image_ref (container: $cid)"
            trivy image --severity HIGH,CRITICAL --ignore-unfixed --format json "$image_ref" \
              > "$SEC_REPORTS_DIR/trivy-runtime-$cid.json" || true
          done

      - name: Run OWASP ZAP Baseline (ensure writable mount and service readiness)
        run: |
          # ensure reports directory is writable to the container
          chmod -R a+rw $(pwd) || true

          # Pull the official zap image (public)
          docker pull zaproxy/zap-stable

          # Double-check service is reachable before running ZAP
          retries=12
          wait_seconds=5
          attempt=0
          until curl -sSf http://localhost:4000/ || [ $attempt -eq $retries ]; do
            echo "Waiting for http://localhost:4000 for ZAP (attempt: $attempt)"
            attempt=$((attempt+1))
            sleep $wait_seconds
          done

          if [ $attempt -eq $retries ]; then
            echo "Service is not reachable, running ZAP anyway may fail but we'll continue (discovery mode)."
          fi

          # Run ZAP as root inside container so it can write to the mounted workspace
          docker run --rm \
            --network host \
            -u 0 \
            -v $(pwd):/zap/wrk \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            ${{ env.SEC_REPORTS_DIR }}/
            zap-baseline.html
            zap-baseline.json

  final_security_report:
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports
      - name: Generate Summary Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
