name: Security Pipeline (Staging)

########################################################
# Triggers
# - Run only on staging branch
# - Allow manual execution
########################################################
on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

########################################################
# Global Environment Variables
########################################################
env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  TRIVY_CACHE_DIR: .trivycache
  DOCKER_BUILDKIT: 1

jobs:

  ########################################################
  # Task 5 & 6 — Secret Scanning (Gitleaks)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Detect exposed secrets, tokens, passwords
  # - Failures are allowed temporarily for visibility
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks Secret Scan
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path security-reports/gitleaks-report.json

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  ########################################################
  # Task 7 & 8 — SCA Filesystem Scan (Trivy)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Detect vulnerable dependencies
  # - Report only, no blocking yet
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Trivy Cache
        run: mkdir -p $TRIVY_CACHE_DIR

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: security-reports/trivy-fs.json

      - name: Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  ########################################################
  # Task 9 & 10 — SAST (Semgrep)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Detect insecure code patterns
  # - Identify security design flaws
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload Semgrep Logs
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


  ########################################################
  # Task 11 — Build Docker Images
  # PURPOSE:
  # - Build backend + frontend images
  # - Validate container build reproducibility
  ########################################################
  build_images:
    runs-on: ubuntu-latest
    needs: sast_scan
    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Secure Runtime Environment Injection
      # - Generate .env dynamically using GitHub Secrets
      ########################################################
      - name: Generate .env from GitHub Secrets
        run: |
          cat <<EOF > .env
          DATABASE=${{ secrets.DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}
          PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Build Docker Images using Docker Compose
        run: docker compose build


  ########################################################
  # Task 12 & 13 — Image Vulnerability Scan (Trivy)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Detect OS + library vulnerabilities in images
  ########################################################
  image_scan:
    runs-on: ubuntu-latest
    needs: build_images
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Image Scans
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | while read image; do
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json"
          done

      - name: Upload Image Scan Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: security-reports/


  ########################################################
  # Task 14 — Deploy Application for Testing
  # PURPOSE:
  # - Bring up full application stack
  # - Prepare environment for runtime & DAST scanning
  ########################################################
  deploy_for_testing:
    runs-on: ubuntu-latest
    needs: image_scan
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env from GitHub Secrets
        run: |
          cat <<EOF > .env
          DATABASE=${{ secrets.DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          OPENSSL_CONF=${{ secrets.OPENSSL_CONF }}
          PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: Deploy Application Stack
        run: docker compose up -d

      - name: Wait for Application Startup
        run: sleep 40


  ########################################################
  # Task 15 — Runtime Vulnerability Scan (Trivy)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Scan running containers
  ########################################################
  runtime_scan:
    runs-on: ubuntu-latest
    needs: deploy_for_testing
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Run Runtime Container Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker ps --format "{{.ID}}" | while read cid; do
            trivy container "$cid" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json"
          done

      - name: Upload Runtime Scan Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-runtime-report
          path: security-reports/


  ########################################################
  # Task 16 — DAST Baseline Scan (OWASP ZAP)
  # MODE: DISCOVERY
  # PURPOSE:
  # - Passive dynamic security testing
  # - Identify runtime vulnerabilities
  ########################################################
  zap_baseline:
    runs-on: ubuntu-latest
    needs: runtime_scan
    continue-on-error: true   # DISCOVERY MODE — Do not block pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --network host \
            -v $(pwd):/zap/wrk \
            owasp/zap2docker-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-baseline.html
            zap-baseline.json
