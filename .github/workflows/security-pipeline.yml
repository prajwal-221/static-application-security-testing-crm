name: Security Pipeline (Staging)

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  DOCKER_BUILDKIT: 1

jobs:

  ########################################################
  # 1 — Secret Scanning (Gitleaks)
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path security-reports/gitleaks-report.json

      - uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  ########################################################
  # 2 — Dependency + FS Scan (Trivy)
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Run Trivy FS Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output $SEC_REPORTS_DIR/trivy-fs.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  ########################################################
  # 3 — SAST (Semgrep)
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


  ########################################################
  # 4 — Docker Build + Image + Runtime + DAST
  ########################################################
  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Docker Hub Login (Avoid Pull Limits)
      ########################################################
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ########################################################
      # Setup Trivy
      ########################################################
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      ########################################################
      # Build Images
      ########################################################
      - name: Build Docker Images
        run: docker compose build

      ########################################################
      # Image Scan
      ########################################################
      - name: Scan Docker Images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | while read image; do
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json"
          done || true

      ########################################################
      # Deploy Stack
      ########################################################
      - name: Deploy Application
        run: docker compose up -d

      - name: Wait for Services
        run: sleep 45

      ########################################################
      # Runtime Scan (Correct Trivy Command)
      ########################################################
      - name: Runtime Container Scan
        run: |
          docker ps --format "{{.ID}}" | while read cid; do
            trivy container "$cid" \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json"
          done || true

      ########################################################
      # DAST — OWASP ZAP Baseline (FIXED IMAGE)
      ########################################################
      - name: Run OWASP ZAP Baseline
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      ########################################################
      # Upload Reports
      ########################################################
      - uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            zap-baseline.html
            zap-baseline.json


  ########################################################
  # 5 — Final Report Bundle
  ########################################################
  final_security_report:
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports

      - name: Generate Summary Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt

      - uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
