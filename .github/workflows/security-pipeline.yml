name: Enterprise DevSecOps Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: idurar-ci
  DOCKER_BUILDKIT: 1

############################################################
# STAGE 1 — Secrets + Dependency Scanning (SCA)
############################################################
jobs:
  secrets_and_sca:
    name: Secrets + SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Reports Directory
        run: mkdir -p $SEC_REPORTS_DIR

      ############################################################
      # Secret Scan — Gitleaks
      ############################################################
      - name: Secret Scan — Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      ############################################################
      # Dependency Scan — Trivy FS
      ############################################################
      - name: Dependency Scan — Trivy FS
        run: |
          docker run --rm -v "$PWD:/scan" aquasec/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      ############################################################
      # Upload Reports
      ############################################################
      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: secrets-and-sca-reports
          path: ${{ env.SEC_REPORTS_DIR }}/


############################################################
# STAGE 2 — Static Application Security Testing (SAST)
############################################################
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # SAST Scan
      ############################################################
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      ############################################################
      # Upload Semgrep Logs
      ############################################################
      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


############################################################
# STAGE 3 — Docker Build + Image + Runtime + DAST (SINGLE STAGE)
############################################################
  docker_security:
    name: Docker Build + Runtime + DAST
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Generate Secure .env
      ############################################################
      - name: Generate Secure .env
        run: |
          umask 077
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=rootpassword
          DATABASE=mongodb://root:rootpassword@mongodb:27017/idurar?authSource=admin
          JWT_SECRET=ci_secret
          NODE_ENV=staging
          OPENSSL_CONF=/dev/null
          PUBLIC_SERVER_FILE=http://backend:4000/
          PORT=4000
          EOF
          chmod 600 .env

      ############################################################
      # Build Images (Single Docker Stage)
      ############################################################
      - name: Build Docker Images
        run: docker compose build

      ############################################################
      # Image Scan — Trivy
      ############################################################
      - name: Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker compose images -q | sort -u | while read img; do
            safe=$(echo "$img" | tr '/:' '_')
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasec/trivy:latest \
              image "$img" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output /out/$SEC_REPORTS_DIR/trivy-image-$safe.json || true
          done

      ############################################################
      # Deploy Stack
      ############################################################
      - name: Deploy Application Stack
        run: docker compose up -d

      ############################################################
      # Health Check (Your Endpoint)
      ############################################################
      - name: Wait for Backend Health
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      ############################################################
      # Runtime Scan — Trivy
      ############################################################
      - name: Runtime Container Scan
        run: |
          docker ps -q | while read cid; do
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD:/out" aquasec/trivy:latest \
              container "$cid" \
              --format json \
              --output /out/$SEC_REPORTS_DIR/trivy-runtime-$cid.json || true
          done

      ############################################################
      # DAST — OWASP ZAP
      ############################################################
      - name: OWASP ZAP Baseline
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm --network host -u root \
            -v "$PWD:/zap/wrk" zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap.html \
            -J zap.json || true

      ############################################################
      # Upload Docker Security Reports
      ############################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            zap.html
            zap.json

      ############################################################
      # Cleanup
      ############################################################
      - name: Cleanup Docker Environment
        if: always()
        run: docker compose down -v --remove-orphans


############################################################
# STAGE 4 — Final Aggregated Report
############################################################
  final_report:
    name: Final Security Report
    runs-on: ubuntu-latest
    needs:
      - secrets_and_sca
      - sast
      - docker_security

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Create Report Index
        run: |
          echo "Enterprise DevSecOps Security Reports" > reports/README.txt
          echo "====================================" >> reports/README.txt
          find reports -type f >> reports/README.txt

      - name: Upload Final Report Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-REPORTS
          path: reports
