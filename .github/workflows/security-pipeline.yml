name: Docker Build + Security Testing (SAST + SCA + DAST)

on:
  push:
    branches: [ "staging", "main" ]
  pull_request:
    branches: [ "staging", "main" ]

env:
  COMPOSE_PROJECT_NAME: idurar-ci
  SEC_REPORTS_DIR: security-reports
  APP_ENV: staging

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      ############################################################
      # SAST — Static Application Security Testing
      ############################################################
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default
        continue-on-error: true

      ############################################################
      # Docker Build
      ############################################################
      - name: Docker Compose Build
        run: docker compose build

      ############################################################
      # SCA — Dependency Scan (Filesystem)
      ############################################################
      - name: Trivy Filesystem Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker run --rm \
            -v "$PWD:/project" \
            aquasec/trivy:latest \
            fs /project \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > $SEC_REPORTS_DIR/trivy-fs.json || true

      ############################################################
      # Image Scan — Trivy
      ############################################################
      - name: Trivy Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > /out/$SEC_REPORTS_DIR/trivy-image-backend.json || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > /out/$SEC_REPORTS_DIR/trivy-image-frontend.json || true

      ############################################################
      # Deploy Runtime Stack
      ############################################################
      - name: Start Docker Stack
        run: docker compose up -d

      ############################################################
      # Health Check — Real Endpoint
      ############################################################
      - name: Backend Health Check
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Backend failed health check"
          docker compose logs backend
          exit 1

      ############################################################
      # DAST — OWASP ZAP
      ############################################################
      - name: OWASP ZAP Baseline Scan
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm \
            --network host \
            -v "$PWD/$SEC_REPORTS_DIR:/zap/wrk" \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -J zap-report.json \
            -w zap-report.md || true

      ############################################################
      # Upload Security Reports
      ############################################################
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: security-reports

      ############################################################
      # Cleanup
      ############################################################
      - name: Shutdown Docker Stack
        if: always()
        run: docker compose down -v --remove-orphans
