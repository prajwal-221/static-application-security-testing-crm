name: Enterprise DevSecOps Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: idurar-ci
  DOCKER_BUILDKIT: 1

############################################################
# STAGE 1 — Secrets + Dependency Scanning (SCA)
############################################################
jobs:
  secrets_and_sca:
    name: Secrets + SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Reports Directory
        run: mkdir -p $SEC_REPORTS_DIR

      - name: Secret Scan — Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      - name: Dependency Scan — Trivy FS
        run: |
          docker run --rm -v "$PWD:/scan" aquasec/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: secrets-and-sca-reports
          path: ${{ env.SEC_REPORTS_DIR }}/


############################################################
# STAGE 2 — Static Application Security Testing (SAST)
############################################################
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload SAST Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/


############################################################
# STAGE 3 — Docker Build + Image + Runtime + DAST
############################################################
  docker_security:
    name: Docker Build + Image + Runtime + DAST
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ############################################################
      # Secure .env Generation
      ############################################################
      - name: Generate Secure .env
        run: |
          umask 077
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=${{ vars.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          DATABASE=${{ secrets.DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=${{ vars.NODE_ENV }}
          PORT=${{ vars.PORT }}
          PUBLIC_SERVER_FILE=${{ vars.PUBLIC_SERVER_FILE }}
          OPENSSL_CONF=/dev/null
          EOF
          chmod 600 .env

      ############################################################
      # Docker Build
      ############################################################
      - name: Build Docker Images
        run: docker compose build

      ############################################################
      # Trivy Image Scan — FIXED
      ############################################################
      - name: Trivy Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/$SEC_REPORTS_DIR:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > "$SEC_REPORTS_DIR/trivy-image-backend.json" || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/$SEC_REPORTS_DIR:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            > "$SEC_REPORTS_DIR/trivy-image-frontend.json" || true

      ############################################################
      # Deploy Application Stack
      ############################################################
      - name: Deploy Stack
        run: docker compose up -d

      ############################################################
      # Backend Health Check (ROBUST)
      ############################################################
      - name: Backend Health Check
        run: |
          echo "Waiting for backend to become healthy..."

          for i in {1..60}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Backend not ready yet... retry $i/60"
            sleep 5
          done

          echo "Backend failed to start within timeout"
          docker compose ps
          docker compose logs backend
          exit 1

      ############################################################
      # Runtime Scan — Trivy (IMAGE BASED)
      ############################################################
      - name: Runtime Scan — Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/$SEC_REPORTS_DIR:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --format json \
            > "$SEC_REPORTS_DIR/trivy-runtime-backend.json" || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/$SEC_REPORTS_DIR:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --format json \
            > "$SEC_REPORTS_DIR/trivy-runtime-frontend.json" || true

      ############################################################
      # DAST — OWASP ZAP
      ############################################################
      - name: OWASP ZAP Baseline
        run: |
          docker pull zaproxy/zap-stable
          docker run --rm --network host \
            -v "$PWD/$SEC_REPORTS_DIR:/zap/wrk" zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap.html \
            -J zap.json || true

      ############################################################
      # Upload Docker Security Reports
      ############################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            security-reports/
            security-reports/zap.html
            security-reports/zap.json

      ############################################################
      # Cleanup Docker Environment
      ############################################################
      - name: Cleanup Docker
        if: always()
        run: docker compose down -v --remove-orphans


############################################################
# STAGE 4 — Final Aggregated Report
############################################################
  final_report:
    name: Final Security Report Bundle
    runs-on: ubuntu-latest
    needs:
      - secrets_and_sca
      - sast
      - docker_security

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Create Report Index
        run: |
          echo "Enterprise DevSecOps Security Reports" > reports/README.txt
          echo "====================================" >> reports/README.txt
          find reports -type f >> reports/README.txt

      - name: Upload Final Report Bundle
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-REPORTS
          path: reports
