name: Security Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  DOCKER_BUILDKIT: 1

jobs:
  ########################################################
  # 1 — Secret Scanning (Gitleaks)
  ########################################################
  secret_scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json

  ########################################################
  # 2 — Dependency + FS Scan (Trivy) -- using Trivy container
  ########################################################
  sca_fs_scan:
    runs-on: ubuntu-latest
    needs: secret_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create reports dir
        run: mkdir -p ${{ env.SEC_REPORTS_DIR }}

      - name: Run Trivy filesystem scan (via container)
        # use Docker image to ensure flags are consistent (no host trivy version mismatch)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workdir \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasecurity/trivy:latest fs /workdir \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output /workdir/${{ env.SEC_REPORTS_DIR }}/trivy-fs.json || true

      - name: Upload FS Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: ${{ env.SEC_REPORTS_DIR }}/trivy-fs.json

  ########################################################
  # 3 — SAST (Semgrep)
  ########################################################
  sast_scan:
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: .semgrep_logs/

  ########################################################
  # 4 — Docker Build + Image Scan + Runtime Scan + DAST
  ########################################################
  docker_security_pipeline:
    runs-on: ubuntu-latest
    needs: sast_scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      ########################################################
      # Docker Hub Login (avoid anonymous pull limits)
      # Make sure you have set DOCKER_USERNAME and DOCKER_TOKEN in repo secrets
      ########################################################
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ########################################################
      # Create .env from GitHub Secrets (safe defaults)
      # This ensures docker compose has all variables and avoids warnings.
      ########################################################
      - name: Create .env (from secrets; with safe defaults)
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          DATABASE: ${{ secrets.DATABASE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          OPENSSL_CONF: ${{ secrets.OPENSSL_CONF }}
          PUBLIC_SERVER_FILE: ${{ secrets.PUBLIC_SERVER_FILE }}
          PORT: ${{ secrets.PORT }}
        run: |
          umask 077
          cat > .env <<EOF
          MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-root}
          MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-rootpassword}
          DATABASE=${DATABASE:-"mongodb://root:rootpassword@mongodb:27017/idurar?authSource=admin"}
          JWT_SECRET=${JWT_SECRET:-"your_private_jwt_secret_key"}
          NODE_ENV=${NODE_ENV:-development}
          OPENSSL_CONF=${OPENSSL_CONF:-/dev/null}
          PUBLIC_SERVER_FILE=${PUBLIC_SERVER_FILE:-http://localhost:4000/}
          PORT=${PORT:-4000}
          EOF
          chmod 600 .env
          echo ".env" >> .gitignore || true
          ls -la .env

      ########################################################
      # Build Docker images (compose)
      ########################################################
      - name: Build Docker Images
        run: docker compose build --no-cache

      ########################################################
      # Image Scan — scan all locally-built images using Trivy container
      ########################################################
      - name: Scan built Docker images (Trivy container)
        run: |
          mkdir -p ${{ env.SEC_REPORTS_DIR }}
          docker images --format "{{.Repository}}:{{.Tag}}" | while read -r image; do
            # skip dangling or none tags
            if [[ -z "$image" || "$image" == "<none>:<none>" ]]; then
              continue
            fi
            safe_name=$(echo "$image" | tr '/:' '_')
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}/${{ env.SEC_REPORTS_DIR }}":/out aquasecurity/trivy:latest \
              image --severity HIGH,CRITICAL --format json --output /out/trivy-image-"$safe_name".json "$image" || true
          done

      ########################################################
      # Deploy stack (for DAST & runtime scanning)
      ########################################################
      - name: Deploy application stack (docker compose up)
        run: docker compose up -d --remove-orphans

      - name: Wait for backend to be ready (wait up to 120s)
        run: |
          set -e
          URL="http://localhost:4000"
          echo "Waiting for $URL to respond (120s timeout)..."
          attempt=0
          max=24
          until curl -sSf --max-time 3 "$URL" >/dev/null; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max" ]; then
              echo "Service did not become ready within $((max*5))s; continuing in discovery mode."
              break
            fi
            echo "Waiting for $URL (attempt: $attempt/$max)..."
            sleep 5
          done

      ########################################################
      # Runtime container scan (Trivy container)
      ########################################################
      - name: Runtime container scan (Trivy container)
        run: |
          mkdir -p ${{ env.SEC_REPORTS_DIR }}
          docker ps --format "{{.ID}} {{.Image}}" | while read -r cid image; do
            if [[ -z "$cid" ]]; then continue; fi
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "${{ github.workspace }}/${{ env.SEC_REPORTS_DIR }}":/out aquasecurity/trivy:latest \
              container --format json --output /out/trivy-runtime-"$cid".json "$cid" || true
          done

      ########################################################
      # DAST — OWASP ZAP baseline using zaproxy/zap-stable
      # run as root so container can write reports to mounted workspace dir
      ########################################################
      - name: Run OWASP ZAP baseline
        run: |
          mkdir -p ${{ env.SEC_REPORTS_DIR }}
          docker pull zaproxy/zap-stable:latest || true
          # ensure target is reachable (best-effort); continue even if not reachable
          TARGET="http://localhost:4000"
          for i in 1 2 3; do
            if curl -sSf --max-time 3 "$TARGET" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          docker run --rm --network host -u root -v "${{ github.workspace }}":/zap/wrk zaproxy/zap-stable:latest \
            zap-baseline.py -t "$TARGET" -r /zap/wrk/zap-baseline.html -J /zap/wrk/zap-baseline.json || true

      ########################################################
      # Upload all reports
      ########################################################
      - name: Upload docker security reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            ${{ env.SEC_REPORTS_DIR }}/
            zap-baseline.html
            zap-baseline.json

  ########################################################
  # 5 — Final Report Bundle
  ########################################################
  final_security_report:
    runs-on: ubuntu-latest
    needs:
      - secret_scan
      - sca_fs_scan
      - sast_scan
      - docker_security_pipeline
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: consolidated-security-reports

      - name: Generate Summary Index
        run: |
          echo "Security Pipeline Reports" > consolidated-security-reports/README.txt
          echo "=========================" >> consolidated-security-reports/README.txt
          find consolidated-security-reports -type f >> consolidated-security-reports/README.txt

      - uses: actions/upload-artifact@v4
        with:
          name: FINAL-SECURITY-DELIVERABLES
          path: consolidated-security-reports
