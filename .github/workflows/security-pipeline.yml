name: Security Pipeline (Staging)

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  TRIVY_CACHE_DIR: .trivycache
  DOCKER_BUILDKIT: 1

jobs:

  #########################################
  # Task 5 & 6 — Secret Scanning (Gitleaks)
  #########################################
  secret_scan:
    name: Secret Scan — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --report-format json --report-path ${{ env.SEC_REPORTS_DIR }}/gitleaks-report.json
        continue-on-error: false

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json


  #########################################
  # Task 7 & 8 — SCA FS Scan (Trivy)
  #########################################
  sca_fs_scan:
    name: Dependency Scan — Trivy FS
    runs-on: ubuntu-latest
    needs: secret_scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Trivy cache
        run: mkdir -p $TRIVY_CACHE_DIR

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: security-reports/trivy-fs.json
        continue-on-error: true   # Discovery mode

      - name: Upload FS scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: security-reports/trivy-fs.json


  #########################################
  # Task 9 & 10 — SAST (Semgrep)
  #########################################
  sast_scan:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: sca_fs_scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          json: true
          output: security-reports/sast-report.json

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: security-reports/sast-report.json


  #########################################
  # Task 11 — Build Application Images
  #########################################
  build_images:
    name: Build Images — Docker Compose
    runs-on: ubuntu-latest
    needs: sast_scan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build


  #########################################
  # Task 12 & 13 — Image Scan (Trivy Image)
  #########################################
  image_scan:
    name: Image Scan — Trivy
    runs-on: ubuntu-latest
    needs: build_images
    steps:
      - uses: actions/checkout@v4

      - name: Scan built images
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker images --format "{{.Repository}}:{{.Tag}}" | while read image; do
            trivy image "$image" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-image-$(echo $image | tr '/:' '_').json"
          done
        continue-on-error: true

      - name: Upload image scan reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: security-reports/


  #########################################
  # Task 14 — Deploy for DAST
  #########################################
  deploy_for_testing:
    name: Deploy Stack — Docker Compose
    runs-on: ubuntu-latest
    needs: image_scan
    steps:
      - uses: actions/checkout@v4

      - name: Deploy application stack
        run: docker compose up -d

      - name: Wait for application
        run: sleep 30


  #########################################
  # Task 15 — Runtime Scan (Trivy)
  #########################################
  runtime_scan:
    name: Runtime Scan — Trivy
    runs-on: ubuntu-latest
    needs: deploy_for_testing
    steps:
      - uses: actions/checkout@v4

      - name: Runtime container scanning
        run: |
          mkdir -p $SEC_REPORTS_DIR
          docker ps --format "{{.ID}}" | while read cid; do
            trivy container "$cid" \
              --severity HIGH,CRITICAL \
              --format json \
              --output "$SEC_REPORTS_DIR/trivy-runtime-$cid.json"
          done
        continue-on-error: true

      - name: Upload runtime reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-runtime-report
          path: security-reports/


  #########################################
  # Task 16 — DAST Baseline (OWASP ZAP)
  #########################################
  zap_baseline:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: runtime_scan
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline
        run: |
          docker run --network host \
            -v $(pwd):/zap/wrk \
            owasp/zap2docker-stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r zap-baseline.html \
            -J zap-baseline.json || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-baseline.html
            zap-baseline.json
