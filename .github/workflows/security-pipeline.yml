name: DevSecOps Pipeline (Staging)

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

env:
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: idurar-ci
  DOCKER_BUILDKIT: 1

############################################################
# STAGE 1 — Secrets + Dependency Scanning (SCA)
############################################################
jobs:
  secrets_and_sca:
    name: Secrets + SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Prepare Report Directory
      ############################################################
      - name: Prepare Reports Directory
        run: mkdir -p $SEC_REPORTS_DIR

      ############################################################
      # Secret Scan — Gitleaks
      ############################################################
      - name: Secret Scan — Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      ############################################################
      # SECRET DETECTION GATE (HARD FAIL)
      # Tool: Gitleaks
      # Condition: Any secret detected → FAIL
      ############################################################
      # - name: Enforce Secret Gate
      #   run: |
      #     if jq -e '. | length > 0' $SEC_REPORTS_DIR/gitleaks.json; then
      #       echo "❌ Secrets detected — blocking pipeline"
      #       exit 1
      #     fi



      ############################################################
      # Dependency Scan — Trivy FS
      ############################################################
      - name: Dependency Scan — Trivy FS
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v "$PWD:/scan" \
            aquasec/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      ############################################################
      # SCA DEPENDENCY GATE
      ############################################################
      # - name: Enforce SCA Gate
      #   run: |
      #     if jq -e '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL")' \
      #       $SEC_REPORTS_DIR/trivy-fs.json; then
      #       exit 1
      #     fi            

      ############################################################
      # Verify Reports Generated (Best Practice)
      ############################################################
      - name: Verify Reports Generated
        run: |
          echo "===== Generated Security Reports ====="
          ls -lh $SEC_REPORTS_DIR || true

      ############################################################
      # Upload SCA Reports
      ############################################################
      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: secrets-and-sca-reports
          path: ${{ env.SEC_REPORTS_DIR }}/

############################################################
# STAGE 2 — Static Application Security Testing (SAST)
############################################################
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Setup Python (Stable Runtime)
      ############################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      ############################################################
      # Install Semgrep CLI
      ############################################################
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      ############################################################
      # Run Semgrep Scan (JSON Output for DefectDojo)
      ############################################################
      - name: Run Semgrep Scan
        run: |
          mkdir -p security-reports/semgrep
          semgrep scan \
            --config=auto \
            --json \
            --output security-reports/semgrep/semgrep.json \
            . || true

      ############################################################
      # SAST GATE
      ############################################################
      # - name: Enforce SAST Gate
      #   run: |
      #     if jq -e '.results[] | select(.extra.severity=="HIGH" or .extra.severity=="CRITICAL")' \
      #       security-reports/semgrep/semgrep.json; then
      #       exit 1
      #     fi

      ############################################################
      # Upload SAST Report Artifact
      ############################################################
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: security-reports/semgrep/semgrep.json


############################################################
# STAGE 3 — Docker Build + Image + Runtime + DAST
############################################################
  docker_security:
    name: Docker Build + Image + Runtime + DAST
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ############################################################
      # Secure .env Generation — FIXED
      ############################################################
      - name: Generate Secure .env
        shell: bash
        run: |
          set -e
          {
            echo "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}"
            echo "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}"
            echo "DATABASE=${{ secrets.DATABASE }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "NODE_ENV=${{ secrets.NODE_ENV }}"
            echo "PORT=${{ secrets.PORT }}"
            echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}"
            echo "OPENSSL_CONF=/dev/null"
          } > .env

      ############################################################
      # Safe Debug — Verify .env Injection
      ############################################################
      - name: Debug — Verify .env Injection (Safe)
        run: |
          echo "===== .env Keys Loaded ====="
          sed 's/=.*$/=****/' .env

      ############################################################
      # Docker Build
      ############################################################
      - name: Build Docker Images
        run: docker compose --env-file .env build

      ############################################################
      # Trivy Image Scan
      ############################################################
      - name: Trivy Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-image-backend.json || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-image-frontend.json || true


      ############################################################
      # Deploy Stack
      ############################################################
      - name: Deploy Stack
        run: docker compose --env-file .env up -d

      ############################################################
      # Startup Diagnostics
      ############################################################
      - name: Docker Status Snapshot
        run: |
          echo "===== Docker Containers ====="
          docker ps -a
          echo ""
          echo "===== Docker Compose Services ====="
          docker compose ps

      - name: MongoDB Logs
        run: docker logs idurar-mongodb --tail=200 || true

      - name: Backend Logs
        run: docker logs idurar-backend --tail=200 || true

      - name: Frontend Logs
        run: docker logs idurar-frontend --tail=200 || true

      ############################################################
      # Backend Health Check
      ############################################################
      - name: Backend Health Check
        run: |
          echo "Waiting for backend to become healthy..."

          for i in {1..60}; do
            if curl -sf http://localhost:4000/public/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Retry $i/60 — backend not ready yet"
            sleep 5
          done

          echo "Backend failed to start"
          docker logs idurar-backend --tail=200 || true
          docker logs idurar-mongodb --tail=200 || true
          exit 1

      ############################################################
      # IMAGE GATE
      ############################################################
      # - name: Enforce Image Gate
      #   run: |
      #     if jq -e '.Results[].Vulnerabilities[] | select(.Severity=="HIGH" or .Severity=="CRITICAL")' \
      #       $SEC_REPORTS_DIR/trivy-image-backend.json; then
      #       exit 1
      #     fi


      ############################################################
      # Runtime Scan — Trivy
      ############################################################
      - name: Runtime Scan — Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-runtime-backend.json || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-runtime-frontend.json || true

      ############################################################
      # RUNTIME GATE
      ############################################################
      # - name: Enforce Runtime Gate
      #   run: |
      #     if jq -e '.Results[].Misconfigurations[] | select(.Severity=="CRITICAL")' \
      #       $SEC_REPORTS_DIR/trivy-runtime-backend.json; then
      #       exit 1
      #     fi



      ############################################################
      # DAST — OWASP ZAP Baseline (DefectDojo Compatible)
      ############################################################
      - name: OWASP ZAP Baseline
        run: |
          mkdir -p security-reports/zap-baseline
          chmod 777 security-reports/zap-baseline
          
          docker pull zaproxy/zap-stable

          docker run --rm \
            --network host \
            -u root \
            -v "$PWD/security-reports/zap-baseline:/zap/wrk" \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:4000 \
            -r zap-baseline.html \
            -x zap-baseline.xml || true

      # Zap Baseline Advisory Gate
      # - name: Zap Baseline Advisory Gate
      #   run: echo "ZAP baseline findings logged (non-blocking)"


      ############################################################
      # ZAP Active DAST — DefectDojo Compatible
      ############################################################
      - name: ZAP Active Scan (Live App)
        run: |
          mkdir -p security-reports/zap-active
          chmod 777 security-reports/zap-active

          docker run --rm \
            -u root \
            --network ${{ env.COMPOSE_PROJECT_NAME }}_idurar-network \
            -v "$PWD/security-reports/zap-active:/zap/wrk" \
            zaproxy/zap-stable \
            zap-full-scan.py \
            -t http://idurar-backend:4000 \
            -r zap-active.html \
            -x zap-active.xml || true

      # ZAP ACTIVE Scan Gate
      # - name: Enforce ZAP Active Gate
      #   run: |
      #     grep -q "<riskdesc>High" security-reports/zap-active/zap-active.xml && exit 1


      ############################################################
      # ZAP Authenticated DAST — DefectDojo Compatible
      ############################################################
      - name: ZAP Authenticated Scan
        run: |
          mkdir -p security-reports/zap-auth
          chmod 777 security-reports/zap-auth

          # Wait for backend to be ready (quick check since global health check already passed)
          echo "Quick backend readiness check..."
          for i in {1..10}; do
            if curl -s -f http://idurar-backend:4000/public/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting... ($i/10)"
            sleep 2
          done

          # Generate a valid JWT token for authentication
          JWT_TOKEN=$(curl -s -X POST http://idurar-backend:4000/api/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@admin.com","password":"admin123"}' | \
            jq -r '.result.token // empty')

          if [ -z "$JWT_TOKEN" ]; then
            echo "Warning: Could not obtain JWT token, proceeding with unauthenticated scan"
            JWT_TOKEN="dummy-token"
          fi

                    # Set Authorization header directly for all requests
          AUTH_HEADER="Authorization: Bearer $JWT_TOKEN"

          docker run --rm \
            -u root \
            -e JWT_TOKEN="$JWT_TOKEN" \
            -e AUTH_HEADER="$AUTH_HEADER" \
            --network ${{ env.COMPOSE_PROJECT_NAME }}_idurar-network \
            -v "$PWD/security-reports/zap-auth:/zap/wrk" \
            zaproxy/zap-stable \
            zap-full-scan.py \
            -t http://idurar-backend:4000 \
            -t http://idurar-backend:4000/api/client/create \
            -z "-config replacer.full_list(0).description=JWT-Auth" \
            -z "-config replacer.full_list(0).enabled=true" \
            -z "-config replacer.full_list(0).matchtype=REQ_HEADER" \
            -z "-config replacer.full_list(0).matchstr=^$" \
            -z "-config replacer.full_list(0).replacement=$AUTH_HEADER" \
            -z "-config replacer.full_list(0).matchregex=true" \
            -r zap-auth.html \
            -x zap-auth.xml || true

      # ZAP Authenticated Scan Gate
      # - name: Enforce ZAP Auth Gate
      #   run: |
      #     grep -q "<riskdesc>High" security-reports/zap-auth/zap-auth.xml && exit 1

      ############################################################
      # Upload Reports
      ############################################################
      - name: Upload Docker Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: security-reports/

      ############################################################
      # Cleanup
      ############################################################
      - name: Cleanup Docker
        if: always()
        run: docker compose --env-file .env down -v --remove-orphans




############################################################
# STAGE 4 — Normalize Reports (Python Engine)
############################################################
  normalize_reports:
    name: Normalize Security Reports
    runs-on: ubuntu-latest
    needs:
      - secrets_and_sca
      - sast
      - docker_security

    steps:
    - uses: actions/checkout@v4

    - name: Download Raw Reports
      uses: actions/download-artifact@v4
      with:
        path: raw-reports

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Normalize Reports
      run: |
        mkdir -p normalized-reports
        python scripts/normalize_reports.py

    - name: Upload Normalized Reports
      uses: actions/upload-artifact@v4
      with:
        name: normalized-reports
        path: normalized-reports/

############################################################
# STAGE 5 — Upload Reports to Public DefectDojo (Correct)
############################################################
  defectdojo_upload:
    name: Upload Reports to DefectDojo (Public)
    runs-on: ubuntu-latest
    needs: normalize_reports
    continue-on-error: true

    steps:
      - name: Download Normalized Reports
        uses: actions/download-artifact@v4
        with:
          name: normalized-reports
          path: dojo-reports

      - name: Upload Reports to DefectDojo
        shell: bash
        run: |
          set -e

          upload() {
            local scan_type="$1"
            local file="$2"

            echo "Uploading [$scan_type] → $file"

            curl -s -X POST "https://demo.defectdojo.org/api/v2/import-scan/" \
              -H "Authorization: Token ${{ secrets.DOJO_API_KEY }}" \
              -F "scan_type=$scan_type" \
              -F "file=@$file" \
              -F "engagement=${{ secrets.DOJO_ENGAGEMENT_ID }}" \
              -F "close_old_findings=false"
          }

          #############################
          # Semgrep (SAST)
          #############################
          find dojo-reports -type f -name "semgrep.json" | while read f; do
            upload "Semgrep JSON Report" "$f"
          done

          #############################
          # Trivy (SCA + Image + Runtime)
          #############################
          find dojo-reports -type f -name "trivy-*.json" | while read f; do
            upload "Trivy Scan" "$f"
          done

          #############################
          # Gitleaks (Secrets)
          #############################
          find dojo-reports -type f -name "gitleaks.json" | while read f; do
            upload "Gitleaks Scan" "$f"
          done

          #############################
          # ZAP (DAST) — XML ONLY
          #############################
          find dojo-reports -type f -name "zap-*.xml" | while read f; do
            upload "ZAP Scan" "$f"
          done



############################################################
# STAGE 6 — Validation Pipeline using Mutillidae (Task 23)
############################################################
  validation_pipeline:
    name: Pipeline Validation using Mutillidae
    runs-on: ubuntu-latest
    needs:
      - docker_security
      - normalize_reports
      - defectdojo_upload
    continue-on-error: true

    steps:
      - name: Run Mutillidae Vulnerable App
        run: |
          docker run -d -p 8081:80 citizenstig/nowasp

      - name: Wait for Mutillidae to Start
        run: |
          echo "Waiting for Mutillidae..."
          for i in {1..30}; do
            if curl -sf http://localhost:8081; then
              echo "Mutillidae is ready"
              exit 0
            fi
            sleep 3
          done
          echo "Mutillidae failed to start"
          docker logs $(docker ps -q) || true
          exit 1

      - name: Validate ZAP against Mutillidae
        run: |
          docker run --rm --network host \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost:8081 \
            -r mutillidae-zap.html || true



############################################################
# STAGE 7 — Documentation Artifact (Task 24)
############################################################
  pipeline_documentation:
    name: Generate Pipeline Documentation
    runs-on: ubuntu-latest
    needs:
      - docker_security
      - normalize_reports
      - defectdojo_upload
      - validation_pipeline

    steps:
      - name: Create Documentation
        run: |
          mkdir -p documentation
          cat <<EOF > documentation/pipeline-blueprint.md
          # DevSecOps Pipeline Blueprint

          ## Stages:
          - Secrets Scan
          - SCA
          - SAST
          - Image Scan
          - Runtime Scan
          - Active + Authenticated DAST
          - Report Normalization
          - DefectDojo Integration
          - Final Reporting
          EOF

      - name: Upload Docs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-documentation
          path: documentation/


############################################################
# STAGE 8 — Final Security Report Generator
############################################################
  final_security_report:
    name: Generate Final Security Report
    runs-on: ubuntu-latest
    needs:
      - docker_security
      - normalize_reports
      - defectdojo_upload
      - validation_pipeline
      - pipeline_documentation

    steps:
      ############################################################
      # Download All Pipeline Artifacts
      ############################################################
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      ############################################################
      # Setup Python Runtime
      ############################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      ############################################################
      # Install Reporting Dependencies
      ############################################################
      - name: Install Dependencies
        run: |
          pip install jinja2 rich

      ############################################################
      # Generate Final Security Report
      ############################################################
      - name: Generate Final Security Report
        run: |
          mkdir -p final-report

          python << 'EOF'
          import os, json, glob, datetime, xml.etree.ElementTree as ET
          from collections import defaultdict
          from jinja2 import Template

          REPORT_ROOT = "all-reports/normalized-reports"

          OUTPUT_FILE = "final-report/final-security-report.md"

          severity = defaultdict(int)
          tools = defaultdict(list)
          
          # Global tracking for gitleaks deduplication across multiple files
          global_gitleaks_seen = set()

          def normalize(sev):
              sev = sev.upper()
              if sev in ["CRITICAL","HIGH","MEDIUM","LOW","INFO"]:
                  return sev
              if sev in ["WARN","WARNING"]:
                  return "MEDIUM"
              return "LOW"

          def parse_trivy(file):
              try:
                  data=json.load(open(file))
                  for r in data.get("Results",[]):
                      for v in r.get("Vulnerabilities",[]):
                          s=normalize(v.get("Severity","LOW"))
                          severity[s]+=1
                          tools["Trivy"].append(v.get("VulnerabilityID","UNKNOWN"))
              except: pass

          def parse_semgrep(file):
              try:
                  data=json.load(open(file))
                  for r in data.get("results",[]):
                      s=normalize(r.get("extra",{}).get("severity","LOW"))
                      severity[s]+=1
                      tools["Semgrep"].append(r.get("check_id","UNKNOWN"))
              except: pass

              
          def parse_gitleaks(file):
              try:
                  data = json.load(open(file))
                  
                  # Gitleaks v8+ uses different structure - handle both old and new formats
                  findings = []
                  
                  if isinstance(data, dict):
                      # New format: {"findings": [...], "summary": {...}}
                      if "findings" in data:
                          findings = data["findings"]
                      # Legacy format: direct array of findings
                      elif len(data) > 0 and any(k in data.get(next(iter(data.keys())), {}) for k in ["RuleID", "Description", "File"]):
                          findings = [data] if "RuleID" in data or "Description" in data else []
                  elif isinstance(data, list):
                      # Direct array format
                      findings = data

                  unique_count = 0

                  for f in findings:
                      # Create a more robust fingerprint for deduplication
                      title = f.get("Description") or f.get("RuleID") or f.get("title") or f.get("rule") or ""
                      file_path = f.get("File") or f.get("file") or f.get("file_path") or ""
                      line = str(f.get("StartLine") or f.get("startLine") or f.get("line") or "")
                      
                      # Normalize the fingerprint
                      fingerprint = (title.strip(), file_path.strip(), line.strip())

                      # Use global deduplication across all gitleaks files
                      if fingerprint in global_gitleaks_seen:
                          continue

                      global_gitleaks_seen.add(fingerprint)
                      unique_count += 1
                      severity["HIGH"] += 1
                      tools["Gitleaks"].append(title)

                  print(f"Gitleaks processed {file}: {unique_count} unique secrets from {len(findings)} total findings")

              except Exception as e:
                  print(f"Gitleaks parse error in {file}: {e}")
                  # If parsing fails, don't add any counts
                  pass

          def parse_zap(file):
              try:
                  tree=ET.parse(file)
                  root=tree.getroot()
                  for alert in root.iter("alertitem"):
                      sev=normalize(alert.findtext("riskdesc","Low").split()[0])
                      severity[sev]+=1
                      tools["ZAP"].append(alert.findtext("name","Web Vulnerability"))
              except: pass

          gitleaks_files_processed = 0
          for f in glob.glob(f"{REPORT_ROOT}/**/*", recursive=True):
              if f.endswith(".json"):
                  if "trivy" in f: parse_trivy(f)
                  elif "semgrep" in f: parse_semgrep(f)
                  elif "gitleaks" in f: 
                      parse_gitleaks(f)
                      gitleaks_files_processed += 1
              elif f.endswith(".xml") and "zap" in f:
                  parse_zap(f)

          print(f"Processed {gitleaks_files_processed} gitleaks report files")
          print(f"Total unique gitleaks findings: {len(tools['Gitleaks'])}")

          total=sum(severity.values())

          risk="LOW"
          if severity["CRITICAL"]>0: risk="CRITICAL"
          elif severity["HIGH"]>10: risk="HIGH"
          elif severity["MEDIUM"]>25: risk="MODERATE"

          decision="APPROVED FOR RELEASE WITH SECURITY CONDITIONS"
          if severity["CRITICAL"]>0:
              decision="RELEASE BLOCKED — CRITICAL RISK PRESENT"

          template=Template("""
          # DevSecOps Final Security Report

          **Project:** IDURAR Platform  
          **Environment:** Staging  
          **Pipeline:** DevSecOps CI/CD  
          **Date:** {{ date }}  

          ---

          # 1. Executive Summary

          ### Overall Security Posture: **{{ risk }} RISK**

          | Severity | Count |
          |------------|--------|
          | Critical | {{ crit }} |
          | High | {{ high }} |
          | Medium | {{ med }} |
          | Low | {{ low }} |
          | Informational | {{ info }} |
          | **Total** | **{{ total }}** |

          **Release Decision:** **{{ decision }}**

          ---

          # 2. Security Coverage Overview

          End-to-end security validation was executed across:

          - Secrets detection
          - Dependency security (SCA)
          - Static application security testing (SAST)
          - Container image & runtime security
          - Dynamic application security testing (DAST)
          - Pipeline exploit validation

          ---

          # 3. Consolidated Vulnerability Analysis

          ## A. Secrets & Credential Exposure — Gitleaks

          **Findings:** {{ gitleaks }}  
          **Impact:** Credential compromise enables unauthorized access, lateral movement, and data exfiltration.  

          **Remediation:**
          - Rotate all exposed credentials immediately  
          - Remove secrets from Git history  
          - Enforce secrets scanning in CI  

          **Engineering Fixes:**
          - Use GitHub Secrets / Vault injection  
          - Implement pre-commit hooks  
          - Enforce secret lifecycle governance  

          ---

          ## B. Dependency & SCA Findings — Trivy

          **Findings:** {{ trivy }}  
          **Impact:** Known vulnerable libraries introduce exploitable attack paths.  

