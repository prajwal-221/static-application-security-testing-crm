name: Final DevSecOps Pipeline

# Consolidated Workflow Trigger Configuration
on:
  pull_request:
    branches:
      - SAST-Sheet-3
      - staging

  push:
    branches:
      - SAST-Sheet-3
      - staging

  schedule:
    - cron: "0 2 * * *"   # Nightly scan at 2 AM UTC

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # From security-pipeline.yaml
  APP_ENV: staging
  SEC_REPORTS_DIR: security-reports
  COMPOSE_PROJECT_NAME: static-application-security-testing-crm
  DOCKER_BUILDKIT: 1
  PIPELINE_MODE: ${{ github.event_name }}
  # From IAC-K8S-Scanning
  K8S_DIR: k8s
  POLICY_DIR: policies
  REPORT_DIR: reports

############################################################
# STAGE 1 — Secrets + Dependency Scanning (SCA)
############################################################
jobs:
  secrets_and_sca:
    name: Secrets + SCA Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/SAST-Sheet-3' || github.ref == 'refs/heads/staging' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Prepare Report Directory
      ############################################################
      - name: Prepare Reports Directory
        run: mkdir -p $SEC_REPORTS_DIR

      ############################################################
      # Secret Scan — Gitleaks
      ############################################################
      - name: Secret Scan — Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo \
            --report-format json \
            --report-path /repo/$SEC_REPORTS_DIR/gitleaks.json || true

      ############################################################
      # Dependency Scan — Trivy FS
      ############################################################
      - name: Dependency Scan — Trivy FS
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v "$PWD:/scan" \
            aquasec/trivy:latest \
            fs /scan \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /scan/$SEC_REPORTS_DIR/trivy-fs.json || true

      ############################################################
      # SCA-02 — npm audit baseline
      ############################################################
      - name: Setup Node for npm audit
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci || true

      - name: Run npm audit (Backend)
        run: |
          cd backend
          npm audit --json > ../$SEC_REPORTS_DIR/npm-audit-backend.json || true

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci || true

      - name: Run npm audit (Frontend)
        run: |
          cd frontend
          npm audit --json > ../$SEC_REPORTS_DIR/npm-audit-frontend.json || true

      ############################################################
      # SCA-03 — License Scanning (ScanCode Toolkit)
      ############################################################
      - name: Run License Scan (ScanCode)
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            ghcr.io/aboutcode-org/scancode-toolkit:latest \
            --license \
            --json /project/$SEC_REPORTS_DIR/license-scan.json \
            /project || true

      ############################################################
      # Verify Reports Generated (Best Practice)
      ############################################################
      - name: Verify Reports Generated
        run: |
          echo "===== Generated Security Reports ====="
          ls -lh $SEC_REPORTS_DIR || true

      ############################################################
      # Upload SCA Reports
      ############################################################
      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        with:
          name: secrets-and-sca-reports
          path: ${{ env.SEC_REPORTS_DIR }}/

############################################################
# STAGE 1.5 — ESLint Security Baseline
############################################################
  eslint_security:
    name: ESLint Security Baseline
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (cached)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      ############################################################
      # Backend ESLint
      ############################################################
      - name: Backend ESLint Security Scan
        continue-on-error: true
        run: |
          cd backend
          npm ci
          npm run lint:security || true

      ############################################################
      # Frontend ESLint
      ############################################################
      - name: Frontend ESLint Security Scan
        continue-on-error: true
        run: |
          cd frontend
          npm ci
          npm run lint:security || true

############################################################
# STAGE 2 — Static Application Security Testing (SAST)
############################################################
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets_and_sca
    continue-on-error: true
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/SAST-Sheet-3' || github.ref == 'refs/heads/staging' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      ############################################################
      # Setup Python (Stable Runtime)
      ############################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            defectdojo/pyproject.toml

      ############################################################
      # Install Semgrep CLI
      ############################################################
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      ############################################################
      # Run Semgrep Scan (JSON Output for DefectDojo)
      ############################################################
      - name: Run Semgrep Scan
        run: |
          mkdir -p security-reports/semgrep
          semgrep scan \
            --config=auto \
            --config=semgrep-rules/ \
            --json \
            --output security-reports/semgrep/semgrep.json \
            . || true

      ############################################################
      # SAST-02 — NodeJsScan (OWASP Node.js Patterns)
      ############################################################
      - name: Install NodeJsScan
        run: |
          pip install nodejsscan

      - name: Run NodeJsScan (Backend)
        run: |
          mkdir -p security-reports/nodejsscan
          nodejsscan backend \
            --json \
            > security-reports/nodejsscan/nodejsscan-backend.json || true

      - name: Upload NodeJsScan Report
        uses: actions/upload-artifact@v4
        with:
          name: nodejsscan-report
          path: security-reports/nodejsscan/

      ############################################################
      # Upload SAST Report Artifact
      ############################################################
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: security-reports/semgrep/semgrep.json

############################################################
# STAGE 3 — Kubernetes Manifest Validation and Policy Enforcement
############################################################
  k8s_manifest_validation_policy:
    name: "K8s Manifest Validation & Policy Enforcement"
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/SAST-Sheet-3' || github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      ############################################################
      # YAML Lint
      ############################################################
      - name: Install yamllint
        run: pip install yamllint

      - name: YAML Lint
        run: |
          mkdir -p $REPORT_DIR
          yamllint -f parsable -d relaxed $K8S_DIR > $REPORT_DIR/yamllint.txt || true
          COUNT=$(wc -l < $REPORT_DIR/yamllint.txt || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "✅ YAML Lint: PASS"
          else
            echo "⚠️  YAML Lint: WARN — $COUNT warnings detected"
            cat $REPORT_DIR/yamllint.txt
          fi

      ############################################################
      # Kubernetes Schema Validation — kubeconform
      ############################################################
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
          | tar xz -C /usr/local/bin

      - name: Kubernetes Schema Validation
        continue-on-error: true
        run: |
          mkdir -p $REPORT_DIR
          find $K8S_DIR -name "*.yaml" -print0 | \
            xargs -0 kubeconform -strict -summary -verbose -output json -ignore-missing-schemas \
            > $REPORT_DIR/kubeconform.json || true
          INVALID=$(jq '.summary.invalid' $REPORT_DIR/kubeconform.json 2>/dev/null || echo 0)
          if [ "$INVALID" -eq 0 ]; then
            echo "✅ Kubeconform: PASS — All schemas valid"
          else
            echo "❌ Kubeconform: FAIL — $INVALID invalid resources"
            exit 1
          fi

      ############################################################
      # Kubernetes Best Practices — kube-score
      ############################################################
      - name: Install kube-score
        run: |
          KUBE_SCORE_URL=$(curl -s https://api.github.com/repos/zegl/kube-score/releases/latest | grep "browser_download_url.*linux_amd64" | grep -v "tar.gz" | head -n 1 | cut -d '"' -f 4)
          if [ -z "$KUBE_SCORE_URL" ]; then
            echo "::warning::Could not find kube-score download URL, using fallback"
            KUBE_SCORE_URL="https://github.com/zegl/kube-score/releases/download/v1.19.0/kube-score_1.19.0_linux_amd64"
          fi
          echo "Downloading kube-score from: $KUBE_SCORE_URL"
          curl -sSL "$KUBE_SCORE_URL" -o /usr/local/bin/kube-score
          chmod +x /usr/local/bin/kube-score
          /usr/local/bin/kube-score version || echo "kube-score installed but version check failed"

      - name: Kubernetes Best Practices
        continue-on-error: true
        run: |
          mkdir -p $REPORT_DIR
          kube-score score $K8S_DIR/**/*.yaml -o json > $REPORT_DIR/kube-score.json || true
          CRITICAL=$(jq '[.[] | .checks[] | select(.grade <= 3)] | length' $REPORT_DIR/kube-score.json 2>/dev/null || echo 0)
          WARNING=$(jq '[.[] | .checks[] | select(.grade > 3 and .grade <= 6)] | length' $REPORT_DIR/kube-score.json 2>/dev/null || echo 0)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Kube-score: FAIL — $CRITICAL critical findings"
            exit 1
          elif [ "$WARNING" -gt 0 ]; then
            echo "⚠️  Kube-score: WARN — $WARNING warnings"
          else
            echo "✅ Kube-score: PASS — No findings"
          fi

      ############################################################
      # Policy Enforcement — Conftest
      ############################################################
      - name: Install Conftest
        run: |
          CONFTEST_URL=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep "browser_download_url.*Linux_x86_64.tar.gz" | cut -d '"' -f 4)
          if [ -z "$CONFTEST_URL" ]; then
            echo "::warning::Could not find conftest download URL, using fallback"
            CONFTEST_URL="https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz"
          fi
          echo "Downloading conftest from: $CONFTEST_URL"
          curl -sSL "$CONFTEST_URL" | tar xz -C /usr/local/bin
          /usr/local/bin/conftest --version || echo "conftest installed but version check failed"

      - name: Policy Enforcement
        continue-on-error: true
        run: |
          mkdir -p $REPORT_DIR
          if [ -d "$POLICY_DIR" ] && [ "$(ls -A $POLICY_DIR 2>/dev/null)" ]; then
            conftest test $K8S_DIR --policy $POLICY_DIR -o json > $REPORT_DIR/conftest.json || true
          else
            echo "[]" > $REPORT_DIR/conftest.json
          fi
          COUNT=$(jq 'length' $REPORT_DIR/conftest.json 2>/dev/null || echo 0)
          if [ "$COUNT" -eq 0 ]; then
            echo "✅ Conftest: PASS — No policy violations"
          else
            echo "❌ Conftest: FAIL — $COUNT violations"
            exit 1
          fi

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: k8s-manifest-validation-reports
          path: |
            ${{ env.REPORT_DIR }}/yamllint.txt
            ${{ env.REPORT_DIR }}/kubeconform.json
            ${{ env.REPORT_DIR }}/kube-score.json
            ${{ env.REPORT_DIR }}/conftest.json

############################################################
# STAGE 4 — Kubernetes & IaC Security Scanning
############################################################
  k8s_iac_security_scanning:
    name: "K8s & IaC Security Scanning"
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/SAST-Sheet-3' || github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      ############################################################
      # Kubernetes Security Scan — kubesec
      ############################################################
      - name: Install kubesec & yq
        run: |
          KUBESEC_URL=$(curl -s https://api.github.com/repos/controlplaneio/kubesec/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          if [ -z "$KUBESEC_URL" ]; then
            echo "::warning::Could not find kubesec download URL, using fallback"
            KUBESEC_URL="https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz"
          fi
          echo "Downloading kubesec from: $KUBESEC_URL"
          curl -sSL "$KUBESEC_URL" | tar xz -C /usr/local/bin
          /usr/local/bin/kubesec version 2>/dev/null || echo "kubesec installed"
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Kubernetes Security Scan
        run: |
          mkdir -p $REPORT_DIR
          echo "[" > $REPORT_DIR/kubesec.json
          first=true
          for file in $(find $K8S_DIR -name "*.yaml"); do
            kind=$(yq e '.kind' "$file")
            case "$kind" in
              Deployment|StatefulSet|DaemonSet|Job|CronJob)
                result=$(kubesec scan "$file" 2>/dev/null || true)
                if [ "$first" = true ]; then first=false; else echo "," >> $REPORT_DIR/kubesec.json; fi
                echo "$result" >> $REPORT_DIR/kubesec.json
                ;;
            esac
          done
          echo "]" >> $REPORT_DIR/kubesec.json
          FINDINGS=$(jq '[.[] | .scoring.advise[]] | length' $REPORT_DIR/kubesec.json 2>/dev/null || echo 0)
          if [ "$FINDINGS" -eq 0 ]; then
            echo "✅ Kubesec: PASS — No security findings"
          else
            echo "⚠️  Kubesec: WARN — $FINDINGS recommendations"
          fi

      ############################################################
      # IaC Security Scan — Checkov
      ############################################################
      - name: Install Checkov
        run: pip install checkov

      - name: IaC Security Scan
        run: |
          mkdir -p $REPORT_DIR
          checkov -d $K8S_DIR -o json > $REPORT_DIR/checkov.json || true
          FAILED=$(jq '.results.failed_checks | length' $REPORT_DIR/checkov.json 2>/dev/null || echo 0)
          if [ "$FAILED" -eq 0 ]; then
            echo "✅ Checkov: PASS — No failed checks"
          else
            echo "⚠️  Checkov: WARN — $FAILED failed checks (see IAC gate for critical enforcement)"
          fi

      ############################################################
      # IaC Gate Enforcement
      ############################################################
      - name: IaC Gate Enforcement — Critical Check
        run: |
          mkdir -p $REPORT_DIR

          checkov -d $K8S_DIR \
            --compact \
            --output json \
            --output-file-path $REPORT_DIR \
            --hard-fail-on HIGH \
            2>&1 | tee $REPORT_DIR/checkov-gate-console.txt || true

          GATE_REPORT="$REPORT_DIR/results_json.json"

          if [ ! -f "$GATE_REPORT" ]; then
            echo "::warning::Checkov gate report not found — defaulting to 0 critical failures"
            echo "✅ IAC Gate: PASS (no report generated)"
            exit 0
          fi

          CRITICAL_COUNT=$(jq '
            [
              .results.failed_checks[]
              | select(.severity == "HIGH" or .severity == "CRITICAL")
            ] | length
          ' "$GATE_REPORT" 2>/dev/null || echo 0)

          echo "──────────────────────────────────────────────"
          echo "IAC Gate — Critical Misconfiguration Report"
          echo "──────────────────────────────────────────────"
          jq -r '
            .results.failed_checks[]
            | select(.severity == "HIGH" or .severity == "CRITICAL")
            | "[\(.severity)] \(.check_id) — \(.check_name)\n  File : \(.repo_file_path)\n  Lines: \(.file_line_range | tostring)\n"
          ' "$GATE_REPORT" 2>/dev/null || echo "(unable to parse details)"

          echo "──────────────────────────────────────────────"
          echo "Total critical failures: $CRITICAL_COUNT"

          {
            echo "# IAC Gate Enforcement Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Critical / HIGH failures | $CRITICAL_COUNT |"
            echo "| Scan directory | $K8S_DIR |"
            echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo ""
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "**Gate Status: ❌ FAILED — $CRITICAL_COUNT critical misconfiguration(s) detected.**"
              echo ""
              echo "Deployment is BLOCKED until all HIGH/CRITICAL findings are resolved."
            else
              echo "**Gate Status: ✅ PASSED — No critical misconfigurations detected.**"
            fi
          } > $REPORT_DIR/iac-gate-summary.md

          cat $REPORT_DIR/iac-gate-summary.md

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::IAC Gate FAILED — $CRITICAL_COUNT critical misconfiguration(s) found."
            exit 1
          fi

          echo "✅ IAC Gate: PASSED"

      - name: Upload Security Scan Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-iac-security-reports
          path: |
            ${{ env.REPORT_DIR }}/kubesec.json
            ${{ env.REPORT_DIR }}/checkov.json
            ${{ env.REPORT_DIR }}/iac-gate-summary.md
            ${{ env.REPORT_DIR }}/checkov-gate-console.txt
            ${{ env.REPORT_DIR }}/results_json.json

############################################################
# STAGE 5 — Docker Build + Image Scanning + SBOM Generation
############################################################
  docker_security:
    name: Docker Build + Image Scanning + SBOM Generation
    runs-on: ubuntu-latest
    needs: [sast, k8s_manifest_validation_policy, k8s_iac_security_scanning]
    continue-on-error: true
    if: github.ref == 'refs/heads/SAST-Sheet-3' || github.ref == 'refs/heads/staging' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      ############################################################
      # SBOM Generation Tool — Syft
      ############################################################
      - name: Install Syft CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      ############################################################
      # Secure .env Generation
      ############################################################
      - name: Generate Secure .env
        shell: bash
        run: |
          set -e
          {
            echo "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}"
            echo "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}"
            echo "DATABASE=${{ secrets.DATABASE }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "NODE_ENV=${{ secrets.NODE_ENV }}"
            echo "PORT=${{ secrets.PORT }}"
            echo "PUBLIC_SERVER_FILE=${{ secrets.PUBLIC_SERVER_FILE }}"
            echo "OPENSSL_CONF=/dev/null"
          } > .env

      ############################################################
      # Safe Debug — Verify .env Injection
      ############################################################
      - name: Debug — Verify .env Injection (Safe)
        run: |
          echo "===== .env Keys Loaded ====="
          sed 's/=.*$/=****/' .env

      ############################################################
      # Docker Build
      ############################################################
      - name: Build Docker Images
        run: docker compose --env-file .env build

      - name: Prepare SBOM Output Directory
        run: mkdir -p $SEC_REPORTS_DIR/sbom

      ############################################################
      # SBOM Generation — Syft
      ############################################################
      - name: Generate SBOM — Source Dependencies
        run: |
          syft dir:. \
            --output json \
            > $SEC_REPORTS_DIR/sbom/sbom-source-deps.json

      - name: Generate SBOM — Backend Image
        run: |
          syft idurar-backend:latest \
            --output json \
            > $SEC_REPORTS_DIR/sbom/sbom-backend-image.json || true

      - name: Generate SBOM — Frontend Image
        run: |
          syft idurar-frontend:latest \
            --output json \
            > $SEC_REPORTS_DIR/sbom/sbom-frontend-image.json || true

      ############################################################
      # Trivy Image Scan
      ############################################################
      - name: Trivy Docker Image Scan
        run: |
          mkdir -p $SEC_REPORTS_DIR

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-backend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-image-backend.json || true

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            aquasec/trivy:latest \
            image idurar-frontend:latest \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            -o /out/$SEC_REPORTS_DIR/trivy-image-frontend.json || true

      ############################################################
      # Upload Docker / Image / SBOM Reports
      ############################################################
      - name: Upload Docker Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-reports
          path: |
            ${{ env.SEC_REPORTS_DIR }}/sbom/
            ${{ env.SEC_REPORTS_DIR }}/trivy-image-backend.json
            ${{ env.SEC_REPORTS_DIR }}/trivy-image-frontend.json

############################################################
# STAGE 6 — Consolidated Security Report (Claude Bot)
############################################################
  report-generation:
    name: Consolidated Security Report — Claude Bot
    runs-on: ubuntu-latest
    needs:
      - secrets_and_sca
      - eslint_security
      - sast
      - k8s_manifest_validation_policy
      - k8s_iac_security_scanning
      - docker_security
    if: always()
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      ############################################################
      # Download all artifacts from all previous jobs
      ############################################################
      - name: Download all security artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      ############################################################
      # Build artifact inventory so Claude knows what is present
      # and what is missing — prevents silent gaps in the report
      ############################################################
      - name: Build artifact inventory
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts

          EXPECTED_ARTIFACTS=(
            "secrets-and-sca-reports"
            "semgrep-report"
            "nodejsscan-report"
            "k8s-manifest-validation-reports"
            "k8s-iac-security-reports"
            "docker-security-reports"
          )

          {
            echo "# Artifact Inventory"
            echo ""
            echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Triggered by: ${{ github.event_name }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "## Job Status"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| secrets_and_sca | ${{ needs.secrets_and_sca.result }} |"
            echo "| eslint_security | ${{ needs.eslint_security.result }} |"
            echo "| sast | ${{ needs.sast.result }} |"
            echo "| k8s_manifest_validation_policy | ${{ needs.k8s_manifest_validation_policy.result }} |"
            echo "| k8s_iac_security_scanning | ${{ needs.k8s_iac_security_scanning.result }} |"
            echo "| docker_security | ${{ needs.docker_security.result }} |"
            echo ""
            echo "## Artifact Status"
            for artifact in "${EXPECTED_ARTIFACTS[@]}"; do
              if [ -d "artifacts/$artifact" ]; then
                FILE_COUNT=$(find "artifacts/$artifact" -type f | wc -l)
                echo "- $artifact: PRESENT ($FILE_COUNT files)"
              else
                echo "- $artifact: MISSING"
              fi
            done
            echo ""
            echo "## All Downloaded Files"
            if find artifacts -type f | grep -q .; then
              find artifacts -type f | sort | sed 's#^#- #'
            else
              echo "- No files downloaded"
            fi
          } > artifacts/artifact-inventory.md

          echo "===== Artifact Inventory ====="
          cat artifacts/artifact-inventory.md

      ############################################################
      # Flatten all artifacts into a single directory so Claude
      # can read them without navigating nested subdirectories
      ############################################################
      - name: Flatten artifacts into single scan-reports directory
        if: always()
        shell: bash
        run: |
          mkdir -p scan-reports
          find artifacts -type f | while read file; do
            filename=$(basename "$file")
            dirname=$(basename "$(dirname "$file")")
            # prefix with parent folder name to avoid name collisions
            cp "$file" "scan-reports/${dirname}__${filename}" 2>/dev/null || true
          done
          cp artifacts/artifact-inventory.md scan-reports/artifact-inventory.md 2>/dev/null || true

          echo "===== Files in scan-reports/ ====="
          ls -lh scan-reports/

      ############################################################
      # Claude bot reads all reports and generates the final
      # consolidated security report using the GitHub App OAuth token
      ############################################################
      - name: Generate consolidated security report with Claude bot
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are a senior security engineer performing a consolidated security report for a CI/CD pipeline run.

            All security scan artifacts from this pipeline run are available in the ./scan-reports/ directory.
            The file artifact-inventory.md in that directory lists every expected tool and whether its output was present or missing.

            The following tools may have produced reports (file names are prefixed with their source job name):
            - Gitleaks: secret scanning (gitleaks.json)
            - Trivy FS: filesystem dependency vulnerability scan (trivy-fs.json)
            - npm audit: JavaScript dependency vulnerabilities (npm-audit-backend.json, npm-audit-frontend.json)
            - ScanCode: license compliance scan (license-scan.json)
            - Semgrep: SAST static analysis (semgrep.json)
            - NodeJsScan: Node.js OWASP pattern scan (nodejsscan-backend.json)
            - yamllint: Kubernetes YAML lint (yamllint.txt)
            - kubeconform: Kubernetes schema validation (kubeconform.json)
            - kube-score: Kubernetes best practices (kube-score.json)
            - Conftest: OPA policy enforcement (conftest.json)
            - kubesec: Kubernetes workload security (kubesec.json)
            - Checkov: IaC security scanning (checkov.json, iac-gate-summary.md)
            - Trivy image: Container image CVE scan (trivy-image-backend.json, trivy-image-frontend.json)
            - Syft SBOM: Software bill of materials (sbom-backend-image.json, sbom-frontend-image.json, sbom-source-deps.json)

            Read every available file in ./scan-reports/ and generate a single consolidated security report.

            Save the report as ./final-security-report.md with exactly these sections:

            # LedgerLink Security Report
            ## Pipeline Run: [branch] | [date]

            ### 1. Executive Summary
            One paragraph summary of the overall security posture. State clearly whether this build is SAFE TO PROMOTE or REQUIRES REMEDIATION before promotion.

            ### 2. Critical and High Findings — Action Required
            List all CRITICAL and HIGH severity findings across all tools. For each finding include: tool name, severity, file or resource affected, description, and recommended fix. If no critical or high findings exist, state that explicitly.

            ### 3. Findings by Tool
            For each tool that produced output, list its findings grouped by severity. If a tool produced no findings, say CLEAN. If a tool report was missing, say REPORT NOT AVAILABLE.

            ### 4. Severity Distribution
            A summary table showing count of findings per severity level per tool.

            ### 5. Duplicate and Overlapping Findings
            Identify findings that appear in multiple tools about the same vulnerability or file. Mark confirmed duplicates and inferred overlaps separately.

            ### 6. SBOM Summary
            Summarise what was found in the SBOM reports — total packages, any flagged packages, license issues.

            ### 7. Remediation Priority List
            Ordered list of the top issues to fix, ranked by severity and exploitability. Include which file to change and what the fix is.

            ### 8. Missing Tool Reports
            List any expected tool reports that were not available and note the impact on report completeness.

            ### 9. Artifact Inventory
            Reproduce the artifact inventory from artifact-inventory.md here.

            Requirements:
            - Only create or modify ./final-security-report.md
            - Do not modify any source code files
            - Do not modify any workflow files
            - Prioritise critical and high findings above everything else
            - If severity is not provided by a tool, state severity unknown
            - Keep language clear for both engineers and engineering leadership
            - The first line after the title must be the SAFE TO PROMOTE or REQUIRES REMEDIATION verdict
          claude_args: |
            --max-turns 15
            --model claude-sonnet-4-6

      ############################################################
      # Fallback report if Claude fails or times out
      ############################################################
      - name: Ensure fallback report exists
        if: always()
        shell: bash
        run: |
          if [ ! -f final-security-report.md ]; then
            {
              echo "# LedgerLink Security Report"
              echo ""
              if [ "${{ github.event_name }}" == "pull_request" ]; then
                echo "> **Status: REPORT GENERATION FAILED** — Claude bot could not generate the consolidated report for this run. Review individual job artifacts manually."
                echo ""
                echo "## Reason"
                echo "The Claude bot did not produce a final report. This may be due to a timeout, authentication failure, or missing artifacts."
              else
                echo "> **Status: AUTOMATED SUMMARY** — Claude bot only runs on pull requests. This is a summary of security scan results for a push event."
                echo ""
                echo "## Note"
                echo "Claude bot report generation is only available on pull request events. For detailed analysis, create a pull request to trigger the full Claude-powered report."
              fi
              echo ""
              echo "## Available Artifacts"
              if [ -f artifacts/artifact-inventory.md ]; then
                cat artifacts/artifact-inventory.md
              else
                echo "No artifact inventory was generated."
              fi
              echo ""
              echo "## Individual Job Results"
              echo "| Job | Result |"
              echo "|-----|--------|"
              echo "| secrets_and_sca | ${{ needs.secrets_and_sca.result }} |"
              echo "| eslint_security | ${{ needs.eslint_security.result }} |"
              echo "| sast | ${{ needs.sast.result }} |"
              echo "| k8s_manifest_validation_policy | ${{ needs.k8s_manifest_validation_policy.result }} |"
              echo "| k8s_iac_security_scanning | ${{ needs.k8s_iac_security_scanning.result }} |"
              echo "| docker_security | ${{ needs.docker_security.result }} |"
            } > final-security-report.md
          fi

      ############################################################
      # Upload consolidated report as artifact
      ############################################################
      - name: Upload consolidated security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-consolidated-report
          path: final-security-report.md
          retention-days: 30

      ############################################################
      # Post the report as a PR comment if triggered by a PR
      # This makes the report visible directly on the PR without
      # needing to download the artifact
      ############################################################
      - name: Post report as PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        run: |
          if [ ! -f final-security-report.md ]; then
            echo "No report file found — skipping PR comment"
            exit 0
          fi

          REPORT_CONTENT=$(cat final-security-report.md)
          CHAR_COUNT=${#REPORT_CONTENT}

          # GitHub PR comments have a 65536 character limit
          # If the report is too long, post a truncated version with a link to the artifact
          if [ "$CHAR_COUNT" -gt 60000 ]; then
            head -c 58000 final-security-report.md > pr-comment-body.md
            cat <<EOF >> pr-comment-body.md

            ---
            > Report truncated at 58000 characters. Download the full report from the **security-consolidated-report** artifact in this workflow run.
            > Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            EOF
          else
            cp final-security-report.md pr-comment-body.md
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file pr-comment-body.md \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
