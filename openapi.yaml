#   PATCH  /setting/update/{id}
#   GET    /setting/search
#   GET    /setting/list
#   GET    /setting/listAll
#   GET    /setting/filter
#   PATCH  /setting/updateManySetting
#
# Clients (7):
#   POST   /client/create
#   GET    /client/read/{id}
#   PATCH  /client/update/{id}
#   DELETE /client/delete/{id}
#   GET    /client/search
#   GET    /client/list
#   GET    /client/listAll
#
# Invoices (8):
#   POST   /invoice/create
#   GET    /invoice/read/{id}
#   PATCH  /invoice/update/{id}
#   DELETE /invoice/delete/{id}
#   GET    /invoice/search
#   GET    /invoice/list
#   GET    /invoice/listAll
#   POST   /invoice/mail
#
# Quotes (8):
#   POST   /quote/create
#   GET    /quote/read/{id}
#   PATCH  /quote/update/{id}
#   DELETE /quote/delete/{id}
#   GET    /quote/search
#   GET    /quote/list
#   GET    /quote/listAll
#   POST   /quote/mail
#
# Payments (8):
#   POST   /payment/create
#   GET    /payment/read/{id}
#   PATCH  /payment/update/{id}
#   DELETE /payment/delete/{id}
#   GET    /payment/search
#   GET    /payment/list
#   GET    /payment/listAll
#   POST   /payment/mail
#
# Payment Modes (7):
#   POST   /paymentmode/create
#   GET    /paymentmode/read/{id}
#   PATCH  /paymentmode/update/{id}
#   DELETE /paymentmode/delete/{id}
#   GET    /paymentmode/search
#   GET    /paymentmode/list
#   GET    /paymentmode/listAll
#
# Taxes (7):
#   POST   /taxes/create
#   GET    /taxes/read/{id}
#   PATCH  /taxes/update/{id}
#   DELETE /taxes/delete/{id}
#   GET    /taxes/search
#   GET    /taxes/list
#   GET    /taxes/listAll


openapi: 3.0.3
info:
  title: IDURAR ERP/CRM API
  description: |
    A comprehensive ERP/CRM application built with Node.js, Express, MongoDB, and React.
    
    ## Authentication
    The API uses JWT (JSON Web Token) based authentication. 
    - Login to receive a Bearer token
    - Include the token in the Authorization header for protected endpoints
    - Token format: `Bearer <jwt_token>`
    
    ## Features
    - Client management
    - Invoice and Quote generation
    - Payment tracking
    - Tax management
    - Payment modes
    - Admin user management
    - Global settings
    
    ## Base URL
    `http://localhost:4000/api` (for production, replace with your domain)
  version: 4.1.1
  contact:
    name: IDURAR Support
    email: hello@idurarapp.com
  license:
    name: Fair-code License

servers:
  - url: http://localhost:4000/api
    description: Development server
  - url: https://your-domain.com/api
    description: Production server

tags:
  - name: Authentication
    description: Authentication and authorization endpoints
  - name: Admin
    description: Admin user management
  - name: Settings
    description: Global settings management
  - name: Clients
    description: Client management
  - name: Invoices
    description: Invoice management
  - name: Quotes
    description: Quote management
  - name: Payments
    description: Payment management
  - name: Payment Modes
    description: Payment method management
  - name: Taxes
    description: Tax management
  - name: Public
    description: Public endpoints (no authentication required)

paths:
  # Authentication endpoints
  /login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["email", "password"]
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
                password:
                  type: string
                  minLength: 6
                  description: User password
              example:
                email: admin@example.com
                password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT authentication token
                      user:
                        $ref: '#/components/schemas/Admin'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /register:
    post:
      tags:
        - Authentication
      summary: User registration
      description: Register a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["email", "password", "name"]
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
                password:
                  type: string
                  minLength: 6
                  description: User password
                name:
                  type: string
                  description: User first name
                surname:
                  type: string
                  description: User last name
              example:
                email: newuser@example.com
                password: password123
                name: John
                surname: Doe
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Admin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /forgetpassword:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["email"]
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
              example:
                email: user@example.com
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Password reset email sent"
        '404':
          description: Email not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /resetpassword:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["userId", "emailToken", "newPassword"]
              properties:
                userId:
                  type: string
                  description: User ID
                emailToken:
                  type: string
                  description: Email verification token
                newPassword:
                  type: string
                  minLength: 6
                  description: New password
              example:
                userId: "64f1a2b3c4d5e6f7g8h9i0j1"
                emailToken: "abc123def456"
                newPassword: newpassword123
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Password reset successful"
        '400':
          $ref: '#/components/responses/BadRequest'

  /logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Logout user and invalidate token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logged out successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Admin endpoints
  /admin/read/{id}:
    get:
      tags:
        - Admin
      summary: Get admin by ID
      description: Retrieve admin user information
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user ID
          schema:
            type: string
      responses:
        '200':
          description: Admin user retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Admin'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/password-update/{id}:
    patch:
      tags:
        - Admin
      summary: Update admin password
      description: Update admin user password
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["currentPassword", "newPassword"]
              properties:
                currentPassword:
                  type: string
                  description: Current password
                newPassword:
                  type: string
                  minLength: 6
                  description: New password
              example:
                currentPassword: oldpassword123
                newPassword: newpassword123
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Password updated successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/profile/password:
    patch:
      tags:
        - Admin
      summary: Update profile password
      description: Update current user's profile password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["currentPassword", "newPassword"]
              properties:
                currentPassword:
                  type: string
                  description: Current password
                newPassword:
                  type: string
                  minLength: 6
                  description: New password
              example:
                currentPassword: oldpassword123
                newPassword: newpassword123
      responses:
        '200':
          description: Profile password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Profile password updated successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/profile/update:
    patch:
      tags:
        - Admin
      summary: Update admin profile
      description: Update current user's profile information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: First name
                surname:
                  type: string
                  description: Last name
                photo:
                  type: string
                  format: binary
                  description: Profile photo file
              example:
                name: John
                surname: Doe
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Admin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Settings endpoints
  /setting/create:
    post:
      tags:
        - Settings
      summary: Create setting
      description: Create a new global setting
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingInput'
      responses:
        '201':
          description: Setting created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/read/{id}:
    get:
      tags:
        - Settings
      summary: Get setting by ID
      description: Retrieve a specific setting
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Setting ID
          schema:
            type: string
      responses:
        '200':
          description: Setting retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/update/{id}:
    patch:
      tags:
        - Settings
      summary: Update setting
      description: Update an existing setting
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Setting ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingInput'
      responses:
        '200':
          description: Setting updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/search:
    get:
      tags:
        - Settings
      summary: Search settings
      description: Search settings with filters
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search query
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/list:
    get:
      tags:
        - Settings
      summary: List settings
      description: Get paginated list of settings
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 10
        - name: enabled
          in: query
          description: Filter by enabled status
          schema:
            type: boolean
      responses:
        '200':
          description: Settings list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/listAll:
    get:
      tags:
        - Settings
      summary: List all settings
      description: Get all settings without pagination
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/filter:
    get:
      tags:
        - Settings
      summary: Filter settings
      description: Filter settings by specific criteria
      security:
        - bearerAuth: []
      parameters:
        - name: filter
          in: query
          description: Filter criteria
          schema:
            type: string
        - name: equal
          in: query
          description: Exact match criteria
          schema:
            type: string
      responses:
        '200':
          description: Filtered settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/readBySettingKey/{settingKey}:
    get:
      tags:
        - Settings
      summary: Get setting by key
      description: Retrieve setting by its key
      security:
        - bearerAuth: []
      parameters:
        - name: settingKey
          in: path
          required: true
          description: Setting key
          schema:
            type: string
      responses:
        '200':
          description: Setting retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/listBySettingKey:
    get:
      tags:
        - Settings
      summary: List settings by key pattern
      description: Get settings matching key pattern
      security:
        - bearerAuth: []
      parameters:
        - name: keys
          in: query
          description: Comma-separated list of setting keys
          schema:
            type: string
      responses:
        '200':
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/updateBySettingKey/{settingKey}:
    patch:
      tags:
        - Settings
      summary: Update setting by key
      description: Update setting by its key
      security:
        - bearerAuth: []
      parameters:
        - name: settingKey
          in: path
          required: true
          description: Setting key
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settingValue:
                  oneOf:
                    - type: string
                    - type: number
                    - type: boolean
                  description: New setting value
              example:
                settingValue: "new value"
      responses:
        '200':
          description: Setting updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/upload/{settingKey}:
    patch:
      tags:
        - Settings
      summary: Upload setting file
      description: Upload file for setting value
      security:
        - bearerAuth: []
      parameters:
        - name: settingKey
          in: path
          required: true
          description: Setting key
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                settingValue:
                  type: string
                  format: binary
                  description: File to upload
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Setting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /setting/updateManySetting:
    patch:
      tags:
        - Settings
      summary: Update multiple settings
      description: Update multiple settings at once
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: array
                  items:
                    type: object
                    properties:
                      settingKey:
                        type: string
                      settingValue:
                        oneOf:
                          - type: string
                          - type: number
                          - type: boolean
              example:
                settings:
                  - settingKey: "company_name"
                    settingValue: "My Company"
                  - settingKey: "company_email"
                    settingValue: "info@company.com"
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Setting'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Client endpoints
  /client/create:
    post:
      tags:
        - Clients
      summary: Create client
      description: Create a new client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '201':
          description: Client created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /client/read/{id}:
    get:
      tags:
        - Clients
      summary: Get client by ID
      description: Retrieve a specific client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client ID
          schema:
            type: string
      responses:
        '200':
          description: Client retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /client/update/{id}:
    patch:
      tags:
        - Clients
      summary: Update client
      description: Update an existing client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /client/delete/{id}:
    delete:
      tags:
        - Clients
      summary: Delete client
      description: Soft delete a client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Client ID
          schema:
            type: string
      responses:
        '200':
          description: Client deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Client deleted successfully"
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /client/search:
    get:
      tags:
        - Clients
      summary: Search clients
      description: Search clients with filters
      security:
