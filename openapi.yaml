components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: Error message
        error:
          type: string
          description: Detailed error information
      example:
        success: false
        message: "Validation failed"
        error: "Email is required"

    Pagination:
      type: object
      properties:
        currentPage:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages
        totalItems:
          type: integer
          description: Total number of items
        itemsPerPage:
          type: integer
          description: Number of items per page
      example:
        currentPage: 1
        totalPages: 10
        totalItems: 100
        itemsPerPage: 10

    Admin:
      type: object
      properties:
        _id:
          type: string
          description: Admin ID
        email:
          type: string
          format: email
          description: Admin email
        name:
          type: string
          description: First name
        surname:
          type: string
          description: Last name
        photo:
          type: string
          description: Profile photo URL
        role:
          type: string
          enum: ['owner']
          description: User role
        enabled:
          type: boolean
          description: Account enabled status
        removed:
          type: boolean
          description: Soft delete flag
        created:
          type: string
          format: date-time
          description: Creation timestamp
      example:
        _id: "64f1a2b3c4d5e6f7g8h9i0j1"
        email: "admin@example.com"
        name: "John"
        surname: "Doe"
        photo: "https://example.com/photo.jpg"
        role: "owner"
        enabled: true
        removed: false
        created: "2024-01-01T12:00:00.000Z"

    Setting:
      type: object
      properties:
        _id:
          type: string
          description: Setting ID
        settingKey:
          type: string
          description: Unique setting key
        settingValue:
          oneOf:
            - type: string
            - type: number
            - type: boolean
          description: Setting value
        description:
          type: string
          description: Setting description
        enabled:
          type: boolean
          description: Setting enabled status
        removed:
          type: boolean
          description: Soft delete flag
        created:
          type: string
          format: date-time
          description: Creation timestamp
        updated:
          type: string
          format: date-time
          description: Last update timestamp
      example:
        _id: "64f1a2b3c4d5e6f7g8h9i0j1"
        settingKey: "company_name"
        settingValue: "My Company"
        description: "Company name"
        enabled: true
        removed: false
        created: "2024-01-01T12:00:00.000Z"
        updated: "2024-01-01T12:00:00.000Z"

    SettingInput:
      type: object
      required:
        - settingKey
        - settingValue
      properties:
        settingKey:
          type: string
          description: Unique setting key
        settingValue:
          oneOf:
            - type: string
            - type: number
            - type: boolean
          description: Setting value
        description:
          type: string
          description: Setting description
        enabled:
          type: boolean
          description: Setting enabled status
      example:
        settingKey: "company_email"
        settingValue: "info@company.com"
        description: "Company contact email"
        enabled: true

    Client:
      type: object
      properties:
        _id:
          type: string
          description: Client ID
        name:
          type: string
          description: Client name
        phone:
          type: string
          description: Phone number
        country:
          type: string
          description: Country
        address:
          type: string
          description: Address
        email:
          type: string
          format: email
          description: Email address
        createdBy:
          $ref: '#/components/schemas/Admin'
        assigned:
          $ref: '#/components/schemas/Admin'
        enabled:
          type: boolean
          description: Client enabled status
        removed:
          type: boolean
          description: Soft delete flag
        created:
          type: string
          format: date-time
          description: Creation timestamp
        updated:
          type: string
          format: date-time
          description: Last update timestamp
      example:
        _id: "64f1a2b3c4d5e6f7g8h9i0j1"
        name: "Acme Corporation"
        phone: "+1-555-0123"
        country: "United States"
        address: "123 Main St, City, State 12345"
        email: "contact@acme.com"
        enabled: true
